<style>
:root{
  --navy-950:#0a1322; --navy-900:#0f1b33; --navy-800:#15294a; --navy-700:#1e3a5f;
  --navy-600:#2a4d78; --navy-500:#3a6296; --navy-100:#e7edf5; --navy-50:#f3f6fa;
  --slate-mist:#f7f8fa; --line:#e5e8ef;
  --accent-900:#11306b; --accent-700:#1d4ed8; --accent-600:#2563eb; --accent-500:#3b82f6;
  --accent-100:#dbeafe; --accent-50:#eef4ff;
  --green:#16a34a; --green-soft:#e8f7ee;
  --amber:#d97706; --amber-soft:#fdf1e0;
  --red:#dc2626; --red-soft:#fbe9e9;
  --violet:#7c3aed; --violet-soft:#f1ecfe;
  --font-display:"Manrope","Inter",sans-serif;
  --font-body:"Inter",sans-serif;
  --font-mono:"JetBrains Mono",monospace;
}
*{box-sizing:border-box;}
html,body,#root{height:100%;}
body{
  margin:0; font-family:var(--font-body); background:var(--slate-mist);
  color:var(--navy-900); -webkit-font-smoothing:antialiased; overscroll-behavior-y:none;
}
h1,h2,h3,h4{font-family:var(--font-display); letter-spacing:-0.01em; margin:0;}
::selection{background:var(--accent-600); color:#fff;}
::-webkit-scrollbar{width:8px; height:8px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#cbd5e1; border-radius:8px;}
::-webkit-scrollbar-thumb:hover{background:#94a3b8;}
button:focus-visible, a:focus-visible, input:focus-visible, select:focus-visible{
  outline:2px solid var(--accent-600); outline-offset:2px;
}
button{font-family:inherit; cursor:pointer; border:none; background:none;}
input,select{font-family:inherit;}
img{max-width:100%; display:block;}
.tabular{font-variant-numeric:tabular-nums;}
.scrollbar-none::-webkit-scrollbar{display:none;}
.scrollbar-none{scrollbar-width:none;}

@keyframes pulse-ring{0%{box-shadow:0 0 0 0 rgba(22,163,74,.4);}70%{box-shadow:0 0 0 12px rgba(22,163,74,0);}100%{box-shadow:0 0 0 0 rgba(22,163,74,0);}}
@keyframes fade-up{from{opacity:0; transform:translateY(8px);}to{opacity:1; transform:translateY(0);}}
.fade-up{animation:fade-up .35s ease-out both;}
@keyframes spin{to{transform:rotate(360deg);}}
.spin{animation:spin 1s linear infinite;}
@media (prefers-reduced-motion: reduce){*{animation-duration:.001ms !important; transition-duration:.001ms !important;}}

.container-app{max-width:1152px; margin:0 auto; padding:24px 16px;}
.container-md{max-width:768px; margin:0 auto; padding:24px 16px;}
.container-lg{max-width:896px; margin:0 auto; padding:24px 16px;}
.flex{display:flex;}
.grid{display:grid;}
.hidden{display:none;}
.relative{position:relative;}
.sticky{position:sticky;}
.fixed{position:fixed;}

@media (min-width:1024px){
  .lg-flex{display:flex !important;}
  .lg-hidden{display:none !important;}
  .lg-block{display:block !important;}
}
@media (max-width:1023px){
  .lg-only{display:none !important;}
}

.card{background:#fff; border:1px solid var(--line); border-radius:16px; box-shadow:0 1px 2px rgba(15,27,51,.04);}
.btn{display:inline-flex; align-items:center; justify-content:center; gap:8px; font-weight:600; border-radius:12px; transition:all .15s; font-size:14px; padding:10px 16px;}
.btn:active{transform:scale(.98);}
.btn:disabled{opacity:.5; cursor:not-allowed; transform:none;}
.btn-primary{background:var(--accent-600); color:#fff;}
.btn-primary:hover:not(:disabled){background:var(--accent-700);}
.btn-success{background:var(--green); color:#fff;}
.btn-success:hover:not(:disabled){background:#15803d;}
.btn-danger{background:var(--red); color:#fff;}
.btn-outline{background:#fff; color:var(--navy-900); border:1px solid var(--line);}
.btn-outline:hover:not(:disabled){background:#f8fafc;}
.btn-lg{font-size:15px; padding:14px 24px;}
.btn-sm{font-size:13px; padding:6px 12px;}

.badge{display:inline-flex; align-items:center; gap:6px; border-radius:999px; padding:4px 10px; font-size:12px; font-weight:600;}
.badge::before{content:""; width:6px; height:6px; border-radius:999px; background:currentColor;}
.badge-hadir{background:var(--green-soft); color:var(--green);}
.badge-terlambat{background:var(--amber-soft); color:var(--amber);}
.badge-alpha{background:var(--red-soft); color:var(--red);}
.badge-izin{background:var(--violet-soft); color:var(--violet);}

.input{width:100%; border:1px solid var(--line); background:#fff; border-radius:12px; padding:12px 16px; font-size:14px; color:var(--navy-900); transition:.15s;}
.input::placeholder{color:#94a3b8;}
.input:focus{border-color:var(--accent-600); outline:none; box-shadow:0 0 0 3px rgba(37,99,235,.12);}
.label{display:block; font-size:14px; font-weight:500; color:var(--navy-800); margin-bottom:6px;}

.avatar{border-radius:999px; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:600; font-family:var(--font-display); flex-shrink:0; object-fit:cover;}

.login-wrap{min-height:100vh; width:100%; background:var(--slate-mist); display:grid;}
@media (min-width:1024px){.login-wrap{grid-template-columns:1fr 1fr;}}
.login-brand{display:none; flex-direction:column; justify-content:space-between; padding:48px; position:relative; overflow:hidden; color:var(--navy-900); background:#fff;}
@media (min-width:1024px){.login-brand{display:flex;}}
.login-brand::before{content:""; position:absolute; inset:0; opacity:.05; background-image:radial-gradient(circle at 1px 1px, var(--accent-600) 1px, transparent 0); background-size:28px 28px;}
.login-form-wrap{display:flex; align-items:center; justify-content:center; padding:24px; background:linear-gradient(150deg, var(--accent-700), var(--accent-500));}
@media (min-width:1024px){.login-form-wrap{border-radius:40px 0 0 40px; box-shadow:-16px 0 40px rgba(15,23,42,.12);}}

.sidebar{display:none; flex-direction:column; width:256px; background:#fff; color:var(--navy-900); height:100vh; position:sticky; top:0; flex-shrink:0; border-right:1px solid var(--line);}
@media (min-width:1024px){.sidebar{display:flex;}}
.nav-item{width:100%; display:flex; align-items:center; gap:12px; padding:11px 14px; border-radius:12px; font-size:14px; font-weight:500; color:#64748b; transition:.15s; text-align:left;}
.nav-item:hover{background:var(--accent-50); color:var(--accent-700);}
.nav-item.active{background:var(--accent-600); color:#fff;}

.topbar-mobile{display:flex; align-items:center; justify-content:space-between; padding:6px 16px; background:#fff; color:var(--navy-900); position:sticky; top:0; z-index:30; border-bottom:1px solid var(--line);}
@media (min-width:1024px){.topbar-mobile{display:none;}}
.bottomnav-mobile{display:flex; position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid var(--line); z-index:30; padding-bottom:env(safe-area-inset-bottom);}
@media (min-width:1024px){.bottomnav-mobile{display:none;}}
.bottomnav-item{flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; padding:10px 0; font-size:11px; font-weight:500; color:#94a3b8;}
.bottomnav-item.active{color:var(--accent-600);}

.att-card{border-radius:24px; background:linear-gradient(135deg, var(--accent-700), var(--accent-500)); padding:28px; color:#fff; position:relative; overflow:hidden; box-shadow:0 14px 30px rgba(37,99,235,.18);}
.att-card::before{content:""; position:absolute; inset:0; opacity:.06; background-image:radial-gradient(circle at 1px 1px, white 1px, transparent 0); background-size:26px 26px; pointer-events:none;}
.att-clock{font-family:var(--font-mono); font-size:44px; font-weight:600; margin-top:4px;}
@media (min-width:640px){.att-clock{font-size:52px;}}

.modal-overlay{position:fixed; inset:0; z-index:50; background:rgba(10,19,34,.9); backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; padding:16px;}
.camera-modal{width:100%; max-width:384px; background:var(--navy-900); border-radius:24px; overflow:hidden;}
.camera-frame{position:relative; aspect-ratio:1/1; background:#000; margin:0 20px; border-radius:16px; overflow:hidden;}
.cam-shutter{width:64px; height:64px; border-radius:999px; background:#fff; display:flex; align-items:center; justify-content:center;}
.cam-shutter-inner{width:88%; height:88%; border-radius:999px; border:3px solid var(--accent-700); display:flex; align-items:center; justify-content:center;}

.modal-backdrop{position:fixed; inset:0; z-index:50; background:rgba(10,19,34,.6); backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; padding:16px;}
.modal-box{width:100%; background:#fff; border-radius:16px; overflow:hidden; max-height:88vh; overflow-y:auto;}

.table-wrap{overflow-x:auto;}
table{width:100%; font-size:14px; border-collapse:collapse;}
thead tr{background:var(--navy-50); color:var(--navy-700); font-size:11px; text-transform:uppercase; letter-spacing:.04em;}
th{text-align:left; font-weight:600; padding:12px 16px;}
td{padding:12px 16px; border-top:1px solid var(--line);}
tbody tr{transition:.1s;}
tbody tr:hover{background:#f8fafc;}

.grid-2{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
.grid-3{display:grid; grid-template-columns:repeat(3,1fr); gap:12px;}
.grid-4{display:grid; grid-template-columns:repeat(2,1fr); gap:12px;}
@media (min-width:1024px){.grid-4{grid-template-columns:repeat(4,1fr);}}
.grid-5{display:grid; grid-template-columns:repeat(2,1fr); gap:12px;}
@media (min-width:640px){.grid-5{grid-template-columns:repeat(3,1fr);}}
@media (min-width:1280px){.grid-5{grid-template-columns:repeat(5,1fr);}}
@media (min-width:640px){.grid-sm-2{grid-template-columns:1fr 1fr;}}

.stat-icon{width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; margin-bottom:12px;}
.spinner{width:32px; height:32px; border-radius:999px; border:2px solid var(--accent-100); border-top-color:var(--accent-600); animation:spin 1s linear infinite;}
.spinner-dark{border:2px solid #e2e6ec; border-top-color:var(--accent-600);}

.chip{flex-shrink:0; font-size:12px; font-weight:500; padding:8px 14px; border-radius:999px; transition:.15s; white-space:nowrap;}
.chip-active{background:var(--accent-600); color:#fff;}
.chip-inactive{background:#fff; color:#64748b; border:1px solid var(--line);}
</style>

/* ======================= INISIALISASI FIREBASE ======================= */
firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.firestore();

const COL = {
  USERS:    "users",
  RECORDS:  "records",
  LEAVES:   "leaves",
  SETTINGS: "settings",
};

const store = {
  users:    [],
  records:  [],
  leaves:   [],
  settings: {},
  ready:    false,
};

const _storeListeners = new Set();
function _notifyStore() { _storeListeners.forEach(fn => fn()); }

async function initFirestore() {
  if (store.ready) return;

  const [usersSnap, recordsSnap, leavesSnap, settingsSnap] = await Promise.all([
    db.collection(COL.USERS).get(),
    db.collection(COL.RECORDS).get(),
    db.collection(COL.LEAVES).orderBy("createdAt", "desc").get(),
    db.collection(COL.SETTINGS).doc("config").get(),
  ]);

  store.users    = usersSnap.docs.map(d => d.data());
  store.records  = recordsSnap.docs.map(d => d.data());
  store.leaves   = leavesSnap.docs.map(d => d.data());
  store.settings = settingsSnap.exists ? settingsSnap.data() : {};
  store.ready    = true;

  if (store.users.length === 0) {
    for (const u of SEED_USERS) {
      await db.collection(COL.USERS).doc(u.id).set(u);
    }
    store.users = [...SEED_USERS];
  }

  db.collection(COL.RECORDS).onSnapshot(snap => {
    store.records = snap.docs.map(d => d.data());
    _notifyStore();
  });
  db.collection(COL.LEAVES).onSnapshot(snap => {
    store.leaves = snap.docs.map(d => d.data()).sort((a, b) => (a.createdAt < b.createdAt ? 1 : -1));
    _notifyStore();
  });
  db.collection(COL.USERS).onSnapshot(snap => {
    store.users = snap.docs.map(d => d.data());
    _notifyStore();
  });
  db.collection(COL.SETTINGS).doc("config").onSnapshot(snap => {
    store.settings = snap.exists ? snap.data() : {};
    _notifyStore();
  });
}

/* ── Fungsi baca (sinkron, dari memori) ─────────────────────────── */
function getUsers()           { return store.users; }
function getUserById(id)      { return store.users.find(u => u.id === id) || null; }
function getRecords()         { return store.records; }
function getRecordsByUser(userId) { return store.records.filter(r => r.userId === userId); }
function getTodayRecordForUser(userId, dateStr) {
  return store.records.find(r => r.userId === userId && r.date === dateStr) || null;
}
function getSettings()        { return { ...DEFAULT_SETTINGS, ...store.settings }; }
function getLeaveRequests()   { return store.leaves; }
function getLeaveRequestsByUser(userId) { return store.leaves.filter(l => l.userId === userId); }

function generateUserId() { return "u-" + Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
function isUsernameTaken(username, excludeId = null) {
  return store.users.some(u => u.username.toLowerCase() === username.trim().toLowerCase() && u.id !== excludeId);
}

const SESSION_KEY = "presensi_session_v2";
function setSession(userId)  { localStorage.setItem(SESSION_KEY, JSON.stringify({ userId, loggedInAt: new Date().toISOString() })); }
function getSession()        { try { return JSON.parse(localStorage.getItem(SESSION_KEY)); } catch { return null; } }
function clearSession()      { localStorage.removeItem(SESSION_KEY); }
function findUserByCredentials(username, password) {
  return store.users.find(u =>
    u.username.toLowerCase() === username.trim().toLowerCase() && u.password === password
  ) || null;
}

function addUser(data) {
  const newUser = {
    id: generateUserId(),
    username: data.username.trim(), password: data.password,
    role: data.role || ROLES.EMPLOYEE,
    name: data.name.trim(), position: data.position.trim(), department: data.department.trim(),
    phone: (data.phone || "").trim(), address: (data.address || "").trim(),
    avatarColor: data.avatarColor || randomAvatarColor(),
    joinDate: todayDateStr(),
  };
  store.users = [...store.users, newUser];
  db.collection(COL.USERS).doc(newUser.id).set(newUser).catch(console.error);
  return newUser;
}
function updateUser(id, data) {
  const idx = store.users.findIndex(u => u.id === id);
  if (idx === -1) return null;
  const updated = { ...store.users[idx], ...data };
  if (!data.password) updated.password = store.users[idx].password;
  store.users = store.users.map(u => u.id === id ? updated : u);
  db.collection(COL.USERS).doc(id).update(data).catch(console.error);
  return updated;
}
function deleteUser(id) {
  store.users    = store.users.filter(u => u.id !== id);
  store.records  = store.records.filter(r => r.userId !== id);
  db.collection(COL.USERS).doc(id).delete().catch(console.error);
  db.collection(COL.RECORDS).where("userId", "==", id).get().then(snap =>
    snap.docs.forEach(d => d.ref.delete())
  ).catch(console.error);
  return true;
}
function saveCheckIn(record) {
  store.records = [...store.records, record];
  db.collection(COL.RECORDS).doc(record.id).set(record).catch(console.error);
  return record;
}
function saveCheckOut(recordId, data) {
  const idx = store.records.findIndex(r => r.id === recordId);
  if (idx === -1) return null;
  const updated = { ...store.records[idx], ...data };
  store.records = store.records.map(r => r.id === recordId ? updated : r);
  db.collection(COL.RECORDS).doc(recordId).update(data).catch(console.error);
  return updated;
}
function updateSettings(partial) {
  const next = { ...getSettings(), ...partial };
  store.settings = next;
  db.collection(COL.SETTINGS).doc("config").set(next).catch(console.error);
  return next;
}

const LEAVE_STATUS = { PENDING: "pending", APPROVED: "approved", REJECTED: "rejected" };
function generateLeaveId() { return "lv-" + Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
function addLeaveRequest(data) {
  const newLeave = {
    id: generateLeaveId(), userId: data.userId, userName: data.userName,
    startDate: data.startDate, endDate: data.endDate, reason: data.reason.trim(),
    status: LEAVE_STATUS.PENDING, createdAt: new Date().toISOString(), decidedAt: null,
  };
  store.leaves = [newLeave, ...store.leaves];
  db.collection(COL.LEAVES).doc(newLeave.id).set(newLeave).catch(console.error);
  return newLeave;
}
function eachWeekdayInRange(startDate, endDate) {
  const dates = [];
  let cursor = new Date(startDate + "T00:00:00");
  const end   = new Date(endDate   + "T00:00:00");
  while (cursor <= end) {
    const dow = cursor.getDay();
    if (dow !== 0 && dow !== 6) dates.push(todayDateStr(cursor));
    cursor.setDate(cursor.getDate() + 1);
  }
  return dates;
}
function decideLeaveRequest(id, decision) {
  const idx = store.leaves.findIndex(l => l.id === id);
  if (idx === -1) return null;
  const updated = { ...store.leaves[idx], status: decision, decidedAt: new Date().toISOString() };
  store.leaves = store.leaves.map(l => l.id === id ? updated : l);
  db.collection(COL.LEAVES).doc(id).update({ status: decision, decidedAt: updated.decidedAt }).catch(console.error);

  if (decision === LEAVE_STATUS.APPROVED) {
    const leave = updated;
    const existingDates = new Set(store.records.filter(r => r.userId === leave.userId).map(r => r.date));
    const batch = db.batch();
    eachWeekdayInRange(leave.startDate, leave.endDate).forEach(dateStr => {
      if (existingDates.has(dateStr)) return;
      const rec = {
        id: `izin-${leave.userId}-${dateStr}`, userId: leave.userId, userName: leave.userName, date: dateStr,
        status: STATUS.IZIN, leaveId: leave.id, leaveReason: leave.reason,
        checkInTime: null, checkOutTime: null, checkInPhoto: null, checkOutPhoto: null,
        checkInLat: null, checkInLng: null, checkInAddress: null, checkInAccuracy: null,
        checkOutLat: null, checkOutLng: null, checkOutAddress: null,
      };
      store.records = [...store.records, rec];
      existingDates.add(dateStr);
      batch.set(db.collection(COL.RECORDS).doc(rec.id), rec);
    });
    batch.commit().catch(console.error);
  }
  return updated;
}

/* ======================= UTIL TANGGAL / WAKTU ======================= */
function todayDateStr(d = new Date()) {
  const y = d.getFullYear(), m = String(d.getMonth() + 1).padStart(2, "0"), day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}
function nowTimeStr(d = new Date()) { return d.toTimeString().slice(0, 8); }
function formatDateID(dateStr) {
  return new Date(dateStr + "T00:00:00").toLocaleDateString("id-ID", { weekday: "long", day: "numeric", month: "long", year: "numeric" });
}
function formatDateShortID(dateStr) {
  return new Date(dateStr + "T00:00:00").toLocaleDateString("id-ID", { day: "2-digit", month: "short", year: "numeric" });
}
function formatClock(d = new Date()) { return d.toLocaleTimeString("id-ID", { hour: "2-digit", minute: "2-digit", second: "2-digit" }); }
function formatTimeHM(t) { return t ? t.slice(0, 5) : "—"; }
function isLate(t) { return t > getSettings().checkInDeadline + ":00"; }
function computeStatus(t) { return !t ? STATUS.ALPHA : (isLate(t) ? STATUS.TERLAMBAT : STATUS.HADIR); }
function currentMonthKey(d = new Date()) { return todayDateStr(d).slice(0, 7); }
function workDurationLabel(checkIn, checkOut) {
  if (!checkIn || !checkOut) return "—";
  const [h1, m1] = checkIn.split(":").map(Number);
  const [h2, m2] = checkOut.split(":").map(Number);
  let mins = h2 * 60 + m2 - (h1 * 60 + m1);
  if (mins < 0) mins += 24 * 60;
  return `${Math.floor(mins / 60)}j ${mins % 60}m`;
}

/* ======================= DETEKSI STATUS ALPHA OTOMATIS ======================= */
function getEffectiveRecordsForUserMonth(userId, userName, monthKey) {
  const real = getRecordsByUser(userId).filter(r => r.date.startsWith(monthKey));
  const realDates = new Set(real.map(r => r.date));
  const [y, m] = monthKey.split("-").map(Number);
  const daysInMonth = new Date(y, m, 0).getDate();
  const todayStr = todayDateStr();
  const user = getUserById(userId);
  const joinDate = user && user.joinDate ? user.joinDate : null;
  const synthetic = [];
  for (let day = 1; day <= daysInMonth; day++) {
    const dateStr = `${monthKey}-${String(day).padStart(2, "0")}`;
    if (dateStr >= todayStr) break;
    if (joinDate && dateStr < joinDate) continue;
    if (realDates.has(dateStr)) continue;
    const dow = new Date(dateStr + "T00:00:00").getDay();
    if (dow === 0 || dow === 6) continue;
    synthetic.push({
      id: `synthetic-${userId}-${dateStr}`, userId, userName, date: dateStr,
      status: STATUS.ALPHA, synthetic: true,
      checkInTime: null, checkOutTime: null, checkInPhoto: null, checkOutPhoto: null,
      checkInLat: null, checkInLng: null, checkInAddress: null, checkOutLat: null, checkOutLng: null, checkOutAddress: null,
    });
  }
  return [...real, ...synthetic].sort((a, b) => (a.date < b.date ? 1 : -1));
}

/* ======================= UTIL GEOLOKASI (Anti Fake GPS) =======================
   Berlapis 4 lapisan deteksi:
     Lapis 1 – Coordinate sanity  : koordinat 0,0 atau di luar batas bumi
     Lapis 2 – Accuracy threshold : akurasi < 1.5 m (ciri khas mock location)
     Lapis 3 – Multi-sample jump  : posisi loncat > 80 m dalam ~1.2 detik
     Lapis 4 – Speed check        : perpindahan > 250 km/jam antar dua sesi absen
   =========================================================================== */

// Referensi posisi sesi absen terakhir (untuk cek kecepatan antar absen)
const _lastKnownPosition = { lat: null, lng: null, timestamp: null };

function _friendlyGeoError(err) {
  if (err.code === err.PERMISSION_DENIED)
    return "Izin lokasi ditolak. Buka Pengaturan HP → Izin Aplikasi → Presensi NIT → izinkan Lokasi.";
  if (err.code === err.POSITION_UNAVAILABLE)
    return "Lokasi GPS tidak tersedia. Pastikan GPS aktif dan coba di area terbuka.";
  if (err.code === err.TIMEOUT)
    return "Waktu pengambilan GPS habis. Pastikan GPS aktif, lalu coba lagi.";
  return "Gagal mengambil lokasi GPS.";
}

function _validateGpsSamples(samples) {
  if (samples.length === 0)
    throw new Error("Tidak ada data GPS yang berhasil diambil.");

  // ── Lapis 1: Coordinate sanity ──────────────────────────────────
  for (const s of samples) {
    if (s.lat === 0 && s.lng === 0)
      throw new Error(
        "⚠️ GPS Palsu Terdeteksi: Koordinat tidak valid (0,0). " +
        "Harap matikan aplikasi fake GPS dan coba lagi."
      );
    if (Math.abs(s.lat) > 90 || Math.abs(s.lng) > 180)
      throw new Error(
        "⚠️ GPS Palsu Terdeteksi: Koordinat di luar batas bumi. " +
        "Harap matikan aplikasi fake GPS dan coba lagi."
      );
  }

  // ── Lapis 2: Accuracy threshold ─────────────────────────────────
  // GPS nyata selalu punya ketidakpastian >= 3 m.
  // Mock location app hampir selalu mengembalikan accuracy = 0 atau sangat kecil.
  for (const s of samples) {
    if (s.accuracy !== null && s.accuracy !== undefined && s.accuracy < 1.5)
      throw new Error(
        "⚠️ GPS Palsu Terdeteksi: Akurasi terlalu sempurna (" + s.accuracy.toFixed(1) + " m). " +
        "GPS asli selalu memiliki ketidakpastian > 3 m. " +
        "Nonaktifkan aplikasi mock location, lalu coba lagi."
      );
  }

  // ── Lapis 3: Multi-sample jump consistency ──────────────────────
  // Dua pembacaan berselang ~1.2 detik tidak boleh loncat > 80 m secara fisik.
  if (samples.length >= 2) {
    for (let i = 1; i < samples.length; i++) {
      const d = distanceMeters(
        samples[i-1].lat, samples[i-1].lng,
        samples[i].lat,   samples[i].lng
      );
      if (d > 80)
        throw new Error(
          "⚠️ GPS Palsu Terdeteksi: Posisi berpindah " + Math.round(d) + " m " +
          "dalam waktu 1 detik — tidak mungkin secara fisik. " +
          "Nonaktifkan aplikasi fake location dan coba lagi."
        );
    }
  }

  // Pilih sampel dengan akurasi terbaik (nilai terkecil = lebih presisi)
  const best = samples.reduce((a, b) => (a.accuracy <= b.accuracy ? a : b));

  // ── Lapis 4: Speed check antar sesi absen ───────────────────────
  if (_lastKnownPosition.lat !== null && _lastKnownPosition.timestamp !== null) {
    const distM   = distanceMeters(
      _lastKnownPosition.lat, _lastKnownPosition.lng,
      best.lat, best.lng
    );
    const dtHours = (Date.now() - _lastKnownPosition.timestamp) / 3600000;
    // Hanya cek jika selang waktu masuk akal: lebih dari 18 detik, kurang dari 24 jam
    if (dtHours > 0.005 && dtHours < 24) {
      const speedKmh = (distM / 1000) / dtHours;
      if (speedKmh > 250)
        throw new Error(
          "⚠️ GPS Palsu Terdeteksi: Perpindahan lokasi tidak masuk akal " +
          "(~" + Math.round(speedKmh) + " km/jam sejak absen terakhir). " +
          "Pastikan GPS aktif dan tidak menggunakan aplikasi fake location."
        );
    }
  }

  // Simpan posisi terpilih sebagai referensi untuk sesi absen berikutnya
  _lastKnownPosition.lat       = best.lat;
  _lastKnownPosition.lng       = best.lng;
  _lastKnownPosition.timestamp = Date.now();

  return { lat: best.lat, lng: best.lng, accuracy: best.accuracy };
}

function getCurrentPosition(options = {}) {
  return new Promise((resolve, reject) => {
    if (!("geolocation" in navigator)) {
      reject(new Error("Perangkat ini tidak mendukung GPS.")); return;
    }

    const samples   = [];
    const MAX_S     = 3;     // ambil 3 sampel untuk cross-check konsistensi
    const INTERVAL  = 1200;  // jeda antar sampel (ms)
    let   collected = 0;

    function finish() {
      try { resolve(_validateGpsSamples(samples)); }
      catch (err) { reject(err); }
    }

    function fallback(originalErr) {
      // Coba sekali lagi dengan akurasi rendah — lebih cepat di WebView Android
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          samples.push({
            lat: pos.coords.latitude,
            lng: pos.coords.longitude,
            accuracy: pos.coords.accuracy,
          });
          finish();
        },
        () => reject(new Error(_friendlyGeoError(originalErr))),
        { enableHighAccuracy: false, timeout: 20000, maximumAge: 60000 }
      );
    }

    function collect() {
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          samples.push({
            lat: pos.coords.latitude,
            lng: pos.coords.longitude,
            accuracy: pos.coords.accuracy,
          });
          collected++;
          if (collected < MAX_S) setTimeout(collect, INTERVAL);
          else finish();
        },
        (err) => {
          if (samples.length > 0) {
            // Sudah punya minimal 1 sampel valid — lanjut validasi
            finish();
          } else if (err.code === err.TIMEOUT || err.code === err.POSITION_UNAVAILABLE) {
            fallback(err);
          } else {
            reject(new Error(_friendlyGeoError(err)));
          }
        },
        { enableHighAccuracy: true, timeout: 30000, maximumAge: 0, ...options }
      );
    }

    collect();
  });
}

async function reverseGeocode(lat, lng) {
  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1`, { headers: { Accept: "application/json" } });
    if (!res.ok) throw new Error("geocode failed");
    const data = await res.json();
    return data.display_name || `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
  } catch {
    return `${lat.toFixed(5)}, ${lng.toFixed(5)} (alamat tidak dapat dimuat)`;
  }
}

// Jarak antar dua titik koordinat (meter) memakai rumus Haversine.
function distanceMeters(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const toRad = (v) => (v * Math.PI) / 180;
  const dLat = toRad(lat2 - lat1), dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

/* ======================= HOOK KAMERA (live capture, anti-galeri) ======================= */
function useCamera() {
  const videoRef = useRef(null);
  const streamRef = useRef(null);
  const [isActive, setIsActive] = useState(false);
  const [error, setError] = useState(null);
  const [facingMode, setFacingMode] = useState("user");

  const stop = useCallback(() => {
    if (streamRef.current) { streamRef.current.getTracks().forEach(t => t.stop()); streamRef.current = null; }
    setIsActive(false);
  }, []);

  const start = useCallback(async (mode = facingMode) => {
    setError(null);
    try {
      if (streamRef.current) { streamRef.current.getTracks().forEach(t => t.stop()); streamRef.current = null; }
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: mode, width: { ideal: 720 }, height: { ideal: 720 } }, audio: false,
      });
      streamRef.current = stream;
      if (videoRef.current) { videoRef.current.srcObject = stream; await videoRef.current.play(); }
      setIsActive(true);
    } catch (err) {
      let message = "Tidak dapat mengakses kamera.";
      if (err.name === "NotAllowedError") message = "Izin kamera ditolak. Aktifkan izin kamera di browser untuk melanjutkan presensi.";
      else if (err.name === "NotFoundError") message = "Kamera tidak ditemukan pada perangkat ini.";
      setError(message);
      setIsActive(false);
    }
  }, [facingMode]);

  const switchCamera = useCallback(async () => {
    const next = facingMode === "user" ? "environment" : "user";
    setFacingMode(next);
    await start(next);
  }, [facingMode, start]);

  const capture = useCallback(() => {
    if (!videoRef.current) return null;
    const video = videoRef.current;
    const size = Math.min(video.videoWidth, video.videoHeight);
    const canvas = document.createElement("canvas");
    canvas.width = 480; canvas.height = 480;
    const ctx = canvas.getContext("2d");
    const sx = (video.videoWidth - size) / 2, sy = (video.videoHeight - size) / 2;
    ctx.translate(canvas.width, 0); ctx.scale(-1, 1);
    ctx.drawImage(video, sx, sy, size, size, 0, 0, canvas.width, canvas.height);
    return canvas.toDataURL("image/jpeg", 0.85);
  }, []);

  useEffect(() => () => stop(), [stop]);

  return { videoRef, isActive, error, start, stop, capture, switchCamera };
}

/* ======================= EXPORT EXCEL & PDF ======================= */
function exportToExcel(records, filenamePrefix = "laporan-presensi") {
  const rows = records.map(r => ({
    Tanggal: formatDateShortID(r.date),
    Nama: r.userName,
    "Jam Masuk": formatTimeHM(r.checkInTime),
    "Jam Pulang": formatTimeHM(r.checkOutTime),
    Status: r.status,
    "Lokasi Masuk": r.checkInAddress || "-",
    "Lokasi Pulang": r.checkOutAddress || "-",
    "Latitude Masuk": r.checkInLat ?? "-",
    "Longitude Masuk": r.checkInLng ?? "-",
  }));
  const ws = XLSX.utils.json_to_sheet(rows);
  ws["!cols"] = [{ wch: 14 }, { wch: 22 }, { wch: 10 }, { wch: 10 }, { wch: 12 }, { wch: 36 }, { wch: 36 }, { wch: 12 }, { wch: 12 }];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Presensi");
  XLSX.writeFile(wb, `${filenamePrefix}-${new Date().toISOString().slice(0, 10)}.xlsx`);
}

function exportRekapPDF(user, monthKey, records) {

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${y}-${String(m).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
    const rec = recordMap[dateStr];
    allRows.push({
      date: dateStr,
      checkInTime:  rec ? rec.checkInTime  : null,
      checkOutTime: rec ? rec.checkOutTime : null,
      status: rec ? rec.status : STATUS.ALPHA,
    });
  }

  // ── Stats dihitung dari allRows ───────────────────────────────────────────
  const stats = {
    hadir:      allRows.filter(r => r.status === STATUS.HADIR).length,

    alpha:      allRows.filter(r => r.status === STATUS.ALPHA).length,
    izin:       allRows.filter(r => r.status === STATUS.IZIN).length,
    totalHadir: allRows.filter(r => r.status === STATUS.HADIR || r.status === STATUS.TERLAMBAT).length,

    .filter(r => r.checkInTime && r.checkOutTime)

      let mins = h2 * 60 + m2 - (h1 * 60 + m1);
      if (mins < 0) mins += 24 * 60;
      return mins;
    });
  const avgMins = durations.length ? Math.round(durations.reduce((a, b) => a + b, 0) / durations.length) : 0;
  const avgDurLabel = durations.length ? `${Math.floor(avgMins / 60)}j ${avgMins % 60}m` : "—";

  const bulanLabel = new Date(y, m - 1, 1).toLocaleDateString("id-ID", { month: "long", year: "numeric" });

  doc.setFontSize(8); doc.setTextColor(180, 200, 220);
  doc.text(`Dicetak ${new Date().toLocaleString("id-ID")}`, pw / 2, 30, { align: "center" });

    doc.text(s.label, x + boxW / 2, y2 + 15, { align: "center" });
  });
  y2 += 30;

  // ── Tabel semua hari ─────────────────────────────────────────────────────
  const tableBody = allRows.map((r, idx) => [
    String(idx + 1),
    new Date(r.date + "T00:00:00").toLocaleDateString("id-ID", { day: "numeric", month: "short", year: "numeric" }),
    new Date(r.date + "T00:00:00").toLocaleDateString("id-ID", { weekday: "short" }),
    r.checkInTime  ? r.checkInTime.slice(0, 5)  : "—",
    r.checkOutTime ? r.checkOutTime.slice(0, 5) : "—",
    r.checkInTime && r.checkOutTime ? workDurationLabel(r.checkInTime, r.checkOutTime) : "—",
    r.status,
  ]);

  doc.autoTable({
  startY: y2,

  margin: {
    left: 14,
    right: 14,
  },

  tableWidth: "auto",

  head: [["#", "Tanggal", "Hari", "Masuk", "Pulang", "Durasi", "Status"]],
  body: tableBody,

  styles: {
    fontSize: 8,
    cellPadding: 3,
    valign: "middle",
    lineWidth: 0.1,
    lineColor: [225, 225, 225],
    overflow: "linebreak",
  },

  headStyles: {
    fillColor: [30, 58, 95],
    textColor: 255,
    fontStyle: "bold",
    fontSize: 8,
    halign: "center",
    valign: "middle",
  },

  alternateRowStyles: {
    fillColor: [248, 250, 252],
  },

  columnStyles: {
    0: { cellWidth: 10, halign: "center" }, // #
    1: { cellWidth: 38, halign: "center" }, // Tanggal
    2: { cellWidth: 18, halign: "center" }, // Hari
    3: { cellWidth: 22, halign: "center" }, // Masuk
    4: { cellWidth: 22, halign: "center" }, // Pulang
    5: { cellWidth: 26, halign: "center" }, // Durasi
    6: { cellWidth: 40, halign: "center" }, // Status
  },

  didDrawCell(data) {
    if (data.section !== "body" || data.column.index !== 6) return;

    const status = String(data.cell.raw || "");

    let bg = [255, 255, 255];
    let fg = [60, 60, 60];

    if (status === "Hadir") {
      bg = [220, 252, 231];
      fg = [22, 163, 74];
    } else if (status === "Terlambat") {
      bg = [254, 243, 199];
      fg = [180, 83, 9];
    } else if (status === "Alpha") {
      bg = [254, 226, 226];
      fg = [220, 38, 38];
    } else if (status === "Izin") {
      bg = [237, 233, 254];
      fg = [124, 58, 237];
    }

    const x = data.cell.x + 2;
    const y = data.cell.y + 2;
    const w = data.cell.width - 4;
    const h = data.cell.height - 4;

    doc.setFillColor(...bg);
    doc.roundedRect(x, y, w, h, 2, 2, "F");

    doc.setFontSize(8);
    doc.setFont("helvetica", "bold");
    doc.setTextColor(...fg);

    doc.text(status, x + w / 2, y + h / 2 + 1, {
      align: "center",
    });
  },
});

  // ── Footer ────────────────────────────────────────────────────────────────
  const finalY = doc.lastAutoTable.finalY || 260;
  const footerY = Math.min(finalY + 12, 282);
  doc.setFont("helvetica", "normal"); doc.setFontSize(8); doc.setTextColor(100, 116, 139);
  doc.text(`Total hari hadir (termasuk terlambat): ${stats.totalHadir} hari`, 14, footerY);
  doc.setTextColor(37, 99, 235);
  doc.text("Tanda tangan atasan / HR", pw - 14, footerY, { align: "right" });
  doc.setDrawColor(37, 99, 235); doc.setLineWidth(0.3);
  doc.line(pw - 60, footerY + 14, pw - 14, footerY + 14);

  doc.save(`rekap-${user.name.replace(/\s+/g, "-")}-${monthKey}.pdf`);
}

/* ======================= DETEKSI "LUPA ABSEN PULANG" ======================= */
function getLupaAbsenPulang(users, checkOutReminderHour = 17) {
  const today = todayDateStr();
  const nowHour = new Date().getHours();
  if (nowHour < checkOutReminderHour) return [];
  const records = getRecords().filter(r => r.date === today);
  return users
    .filter(u => {
      const rec = records.find(r => r.userId === u.id);
      return rec && rec.checkInTime && !rec.checkOutTime;
    })
    .map(u => u.id);
}

/* ======================= ICON WRAPPER (lucide UMD) ======================= */
function lucideIconKey(name) {
  return name
    .split("-")
    .map(part => part.charAt(0).toUpperCase() + part.slice(1))
    .join("");
}
function lucideNodeToSvgString(node, overrideAttrs) {
  const [tag, attrs = {}, children = []] = node;
  const mergedAttrs = tag === "svg" ? { ...attrs, ...overrideAttrs } : attrs;
  const attrStr = Object.entries(mergedAttrs)
    .map(([k, v]) => `${k}="${String(v).replace(/"/g, "&quot;")}"`)
    .join(" ");
  const childStr = children.map(child => lucideNodeToSvgString(child)).join("");
  return `<${tag} ${attrStr}>${childStr}</${tag}>`;
}
function Icon({ name, size = 18, strokeWidth = 2, className = "", style = {} }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current || !window.lucide || !window.lucide.icons) return;
    const key = lucideIconKey(name);
    const iconData = window.lucide.icons[name] || window.lucide.icons[key];
    if (!iconData) return;
    try {
      const svg = lucideNodeToSvgString(iconData, { width: size, height: size, "stroke-width": strokeWidth });
      ref.current.innerHTML = svg;
    } catch (e) {}
  }, [name, size, strokeWidth]);
  return <span ref={ref} className={className} style={{ display: "inline-flex", lineHeight: 0, ...style }} />;
}
function LogoMark({ size = 36 }) {
  return (
    <img
      src={LOGO_DATA_URI}
      alt="Logo NIT Presensi"

    />
  );
}

/* ======================= AUTH CONTEXT ======================= */
const AuthContext = createContext(null);

function AuthProvider({ children }) {
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);
  const [initError, setInitError] = useState(null);

  useEffect(() => {
    initFirestore()
      .then(() => {
        const session = getSession();
        if (session && session.userId) {
          const u = getUserById(session.userId);
          if (u) setUser(u);
        }
        setLoading(false);
      })
      .catch(err => {
        console.error("Firebase init error:", err);
        setInitError(err.message || "Gagal terhubung ke server. Periksa konfigurasi Firebase.");
        setLoading(false);
      });
  }, []);

  useEffect(() => {
    if (!user) return;
    const fn = () => { const u = getUserById(user.id); if (u) setUser(u); };
    _storeListeners.add(fn);
    return () => _storeListeners.delete(fn);
  }, [user?.id]);

  const login = useCallback((username, password) => {
    const found = findUserByCredentials(username, password);
    if (!found) return { ok: false, message: "Username atau kata sandi salah." };
    setSession(found.id);
    setUser(found);
    return { ok: true };
  }, []);

  const logout = useCallback(() => { clearSession(); setUser(null); }, []);
  const refreshCurrentUser = useCallback(() => { setUser(u => (u ? getUserById(u.id) : u)); }, []);

  if (initError) return (
    <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "#fef2f2", padding: 24 }}>
      <div style={{ maxWidth: 480, background: "#fff", borderRadius: 16, padding: 32, boxShadow: "0 4px 24px rgba(0,0,0,.08)", textAlign: "center" }}>
        <div style={{ fontSize: 40, marginBottom: 16 }}>🔥</div>
        <h2 style={{ fontWeight: 700, color: "#1e293b", marginBottom: 8 }}>Koneksi Firebase Gagal</h2>
        <p style={{ fontSize: 14, color: "#64748b", marginBottom: 20 }}>{initError}</p>
        <div style={{ background: "#f8fafc", borderRadius: 10, padding: 16, textAlign: "left", fontSize: 13, color: "#334155" }}>
          <p style={{ fontWeight: 700, marginBottom: 8 }}>Langkah perbaikan:</p>
          <ol style={{ paddingLeft: 18, lineHeight: 2 }}>
            <li>Buka <code>FIREBASE_CONFIG</code> di bagian atas script</li>
            <li>Isi <code>apiKey</code>, <code>projectId</code>, dll dari Firebase Console</li>
            <li>Aktifkan Firestore di Firebase: Build → Firestore Database</li>
            <li>Set Firestore Rules: <code>allow read, write: if true;</code></li>
          </ol>
        </div>
      </div>
    </div>
  );

  return <AuthContext.Provider value={{ user, loading, login, logout, refreshCurrentUser }}>{children}</AuthContext.Provider>;
}
function useAuth() {
  const ctx = useContext(AuthContext);
  if (!ctx) throw new Error("useAuth must be used within AuthProvider");
  return ctx;
}
function useStoreSync() {
  const [, forceUpdate] = React.useReducer(n => n + 1, 0);
  useEffect(() => {
    _storeListeners.add(forceUpdate);
    return () => _storeListeners.delete(forceUpdate);
  }, []);
}

/* ======================= ATTENDANCE CARD ======================= */
const STEP = { IDLE: "idle", LOCATING: "locating", CAMERA: "camera", SAVING: "saving" };

function AttendanceCard({ user, onUpdated }) {
  const [now, setNow] = useState(new Date());
  const [record, setRecord] = useState(null);
  const [step, setStep] = useState(STEP.IDLE);
  const [mode, setMode] = useState(null);
  const [locationData, setLocationData] = useState(null);
  const [error, setError] = useState("");

  useEffect(() => { const t = setInterval(() => setNow(new Date()), 1000); return () => clearInterval(t); }, []);
  useEffect(() => { refreshRecord(); }, [user.id]);

  function refreshRecord() { setRecord(getTodayRecordForUser(user.id, todayDateStr())); }

  async function beginFlow(flowMode) {
    setError(""); setMode(flowMode); setStep(STEP.LOCATING);
    try {
      const pos = await getCurrentPosition();
      const address = await reverseGeocode(pos.lat, pos.lng);
      const settings = getSettings();
      let distance = null, withinRadius = true, nearestLocation = null;
      if (settings.officeLocations && settings.officeLocations.length > 0) {
        const dists = settings.officeLocations.map(loc => ({
          loc,
          dist: Math.round(distanceMeters(pos.lat, pos.lng, loc.lat, loc.lng)),
        }));
        const nearest = dists.reduce((a, b) => a.dist < b.dist ? a : b);
        distance = nearest.dist;
        nearestLocation = nearest.loc;
        withinRadius = distance <= settings.radiusMeters;
      }
      if (settings.enforceRadius && !withinRadius) {
        setError(`Anda berada ${distance.toLocaleString("id-ID")} m dari lokasi kantor terdekat "${nearestLocation.name}" (maks ${settings.radiusMeters} m). Absen hanya dapat dilakukan di dalam radius kantor.`);
        setStep(STEP.IDLE);
        return;
      }
      setLocationData({ ...pos, address, distance, withinRadius, nearestLocation });
      setStep(STEP.CAMERA);
    } catch (err) {
      setError(err.message); setStep(STEP.IDLE);
    }
  }
  function cancelFlow() { setStep(STEP.IDLE); setMode(null); setLocationData(null); }

  async function handlePhotoConfirmed(photoDataUrl) {
    setStep(STEP.SAVING);
    const nowDate = new Date();
    const dateStr = todayDateStr(nowDate);
    const timeStr = nowTimeStr(nowDate);
    try {
      if (mode === "in") {
        const status = computeStatus(timeStr);
        saveCheckIn({
          id: `att-${user.id}-${dateStr}`, userId: user.id, userName: user.name, date: dateStr,
          checkInTime: timeStr, checkInPhoto: photoDataUrl, checkInLat: locationData.lat, checkInLng: locationData.lng,
          checkInAddress: locationData.address, checkInAccuracy: locationData.accuracy,
          checkInDistance: locationData.distance, checkInWithinRadius: locationData.withinRadius,
          checkInNearestLocation: locationData.nearestLocation?.name || null,
          checkOutTime: null, checkOutPhoto: null, checkOutLat: null, checkOutLng: null, checkOutAddress: null,
          status, gpsValidated: true,
        });
      } else {
        saveCheckOut(record.id, {
          checkOutTime: timeStr, checkOutPhoto: photoDataUrl, checkOutLat: locationData.lat,
          checkOutLng: locationData.lng, checkOutAddress: locationData.address,
          checkOutDistance: locationData.distance, checkOutWithinRadius: locationData.withinRadius,
          checkOutNearestLocation: locationData.nearestLocation?.name || null,
          gpsValidated: true,
        });
      }
      refreshRecord();
      if (onUpdated) onUpdated();
      setStep(STEP.IDLE); setMode(null); setLocationData(null);
    } catch (err) {
      setError("Gagal menyimpan data presensi. Coba lagi.");
      setStep(STEP.IDLE);
    }
  }

  const hasCheckedIn = !!(record && record.checkInTime);
  const hasCheckedOut = !!(record && record.checkOutTime);
  const isOnLeaveToday = !!(record && record.status === STATUS.IZIN);

  return (
    <React.Fragment>
      <div className="att-card">
        <div className="relative" style={{ zIndex: 1, display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 24 }}>
          <div>
            <p style={{ color: "rgba(231,237,245,.7)", fontSize: 14 }}>{formatDateID(todayDateStr(now))}</p>
            <p className="att-clock tabular">{formatClock(now)}</p>
          </div>
          {record && <StatusBadge status={record.status} />}
        </div>

        <div className="relative grid-2" style={{ zIndex: 1, marginBottom: 24 }}>
          <div style={{ background: "rgba(255,255,255,.1)", borderRadius: 12, padding: 14 }}>
            <p style={{ color: "rgba(231,237,245,.6)", fontSize: 12, marginBottom: 4 }}>Jam Masuk</p>
            <p className="tabular" style={{ fontFamily: "var(--font-mono)", fontSize: 20, fontWeight: 600 }}>{formatTimeHM(record && record.checkInTime)}</p>
          </div>
          <div style={{ background: "rgba(255,255,255,.1)", borderRadius: 12, padding: 14 }}>
            <p style={{ color: "rgba(231,237,245,.6)", fontSize: 12, marginBottom: 4 }}>Jam Pulang</p>
            <p className="tabular" style={{ fontFamily: "var(--font-mono)", fontSize: 20, fontWeight: 600 }}>{formatTimeHM(record && record.checkOutTime)}</p>
          </div>
        </div>

        {error && (
          <div className="relative" style={{ zIndex: 1, marginBottom: 16, display: "flex", gap: 8, background: "rgba(220,38,38,.2)", color: "#fff", borderRadius: 12, padding: "10px 14px", fontSize: 14 }}>
            <Icon name="alert-circle" size={16} style={{ flexShrink: 0, marginTop: 2 }} />
            <span>{error}</span>
          </div>
        )}
        {step === STEP.LOCATING && (
          <div className="relative" style={{ zIndex: 1, marginBottom: 16, display: "flex", alignItems: "center", gap: 8, background: "rgba(255,255,255,.1)", borderRadius: 12, padding: "10px 14px", fontSize: 14 }}>
            <Icon name="loader-2" size={16} className="spin" />
            <span>Memverifikasi lokasi GPS (mengambil 3 sampel)…</span>
          </div>
        )}

        <div className="relative" style={{ zIndex: 1 }}>
          {isOnLeaveToday && (
            <div style={{ width: "100%", display: "flex", alignItems: "center", justifyContent: "center", gap: 8, background: "rgba(255,255,255,.16)", color: "#fff", fontWeight: 600, borderRadius: 12, padding: "16px 0", fontSize: 14, textAlign: "center" }}>
              <Icon name="calendar-check-2" size={18} /> Anda sedang izin/cuti hari ini
            </div>
          )}
          {!isOnLeaveToday && !hasCheckedIn && (
            <button onClick={() => beginFlow("in")} disabled={step !== STEP.IDLE}
              className="btn" style={{ width: "100%", background: "#fff", color: "var(--accent-700)", padding: "16px 0", fontSize: 14 }}>
              <Icon name="log-in" size={18} /> Absen Masuk
            </button>
          )}
          {!isOnLeaveToday && hasCheckedIn && !hasCheckedOut && (
            <button onClick={() => beginFlow("out")} disabled={step !== STEP.IDLE}
              className="btn" style={{ width: "100%", background: "var(--amber)", color: "#fff", padding: "16px 0", fontSize: 14 }}>
              <Icon name="log-out" size={18} /> Absen Pulang
            </button>
          )}
          {!isOnLeaveToday && hasCheckedIn && hasCheckedOut && (
            <div style={{ width: "100%", display: "flex", alignItems: "center", justifyContent: "center", gap: 8, background: "rgba(255,255,255,.1)", color: "#fff", fontWeight: 600, borderRadius: 12, padding: "16px 0", fontSize: 14 }}>
              <Icon name="check-circle-2" size={18} /> Presensi hari ini selesai
            </div>
          )}
        </div>

        {locationData && step === STEP.CAMERA && (
          <div className="relative" style={{ zIndex: 1, marginTop: 12, display: "flex", flexDirection: "column", gap: 6 }}>
            <div className="flex" style={{ gap: 6, color: "rgba(231,237,245,.7)", fontSize: 12 }}>
              <Icon name="map-pin" size={14} style={{ flexShrink: 0, marginTop: 2 }} />
              <span>{locationData.address}</span>
            </div>
            {locationData.withinRadius === false && (
              <div className="flex" style={{ gap: 6, color: "#fde68a", fontSize: 12 }}>
                <Icon name="alert-triangle" size={14} style={{ flexShrink: 0, marginTop: 2 }} />
                <span>Lokasi Anda ±{locationData.distance.toLocaleString("id-ID")} m dari "{locationData.nearestLocation?.name || "kantor"}", di luar radius normal.</span>
              </div>
            )}
          </div>
        )}
      </div>

      {step === STEP.CAMERA && (
        <CameraCaptureModal
          title={mode === "in" ? "Selfie Absen Masuk" : "Selfie Absen Pulang"}
          onCapture={handlePhotoConfirmed}
          onClose={cancelFlow}
        />
      )}

      {step === STEP.SAVING && (
        <div className="modal-overlay">
          <div className="card" style={{ padding: "28px 32px", display: "flex", flexDirection: "column", alignItems: "center", gap: 12 }}>
            <Icon name="loader-2" size={28} className="spin" style={{ color: "var(--accent-600)" }} />
            <p style={{ color: "var(--navy-900)", fontWeight: 500, fontSize: 14 }}>Menyimpan data presensi…</p>
          </div>
        </div>
      )}
    </React.Fragment>
  );
}

/* ======================= HALAMAN LOGIN ======================= */
function LoginPage() {
  const { login } = useAuth();
  const [username, setUsername] = useState("");
  const [password, setPassword] = useState("");
  const [showPassword, setShowPassword] = useState(false);
  const [error, setError] = useState("");
  const [submitting, setSubmitting] = useState(false);

  function handleSubmit(e) {
    e.preventDefault();
    setError("");
    if (!username.trim() || !password) { setError("Username dan kata sandi wajib diisi."); return; }
    setSubmitting(true);
    setTimeout(() => {
      const result = login(username, password);
      if (!result.ok) { setError(result.message); setSubmitting(false); }
    }, 300);
  }

  return (
    <div className="login-wrap">
      <div className="login-brand">
        <div className="flex" style={{ alignItems: "flex-start", zIndex: 1 }}>
          <LogoMark size={220} />
        </div>
        <div style={{ maxWidth: 420, zIndex: 1 }}>
          <h1 style={{ fontSize: 36, fontWeight: 800, lineHeight: 1.15, marginBottom: 16, color: "var(--navy-900)" }}>
            Kehadiran tim Anda, tercatat akurat setiap hari.
          </h1>
          <p style={{ color: "#64748b", fontSize: 16, lineHeight: 1.6 }}>
            Absen masuk dan pulang dengan verifikasi selfie langsung dan lokasi GPS real-time.
            Data tersimpan otomatis sebagai bukti kehadiran yang sah.
          </p>
        </div>
        <div className="flex" style={{ alignItems: "center", gap: 12, color: "var(--accent-700)", fontSize: 14, zIndex: 1 }}>
          <Icon name="shield-check" size={18} />
          <span>Selfie live dan timestamp otomatis mencegah manipulasi data.</span>
        </div>
      </div>

      <div className="login-form-wrap">
        <div style={{ width: "100%", maxWidth: 500 }} className="fade-up">
          <div className="lg-hidden flex" style={{ justifyContent: "center", marginBottom: 32 }}>
            <LogoMark size={220} />
          </div>

          <h2 style={{ fontSize: 30, fontWeight: 700, color: "#fff", marginBottom: 6 }}>Masuk ke akun Anda</h2>
          <p style={{ color: "rgba(255,255,255,.75)", fontSize: 16, marginBottom: 32 }}>Gunakan username dan kata sandi yang terdaftar.</p>

          <form onSubmit={handleSubmit} style={{ display: "flex", flexDirection: "column", gap: 20 }}>
            <div>
              <label style={{ display: "block", fontSize: 15, fontWeight: 500, color: "#fff", marginBottom: 8 }}>Username</label>
              <input type="text" value={username} onChange={e => setUsername(e.target.value)} placeholder="contoh: andika" autoComplete="username" className="input" style={{ fontSize: 16, padding: "15px 18px", borderRadius: 14 }} />
            </div>
            <div>
              <label style={{ display: "block", fontSize: 15, fontWeight: 500, color: "#fff", marginBottom: 8 }}>Kata sandi</label>
              <div style={{ position: "relative" }}>
                <input type={showPassword ? "text" : "password"} value={password} onChange={e => setPassword(e.target.value)}
                  placeholder="••••••••" autoComplete="current-password" className="input" style={{ fontSize: 16, padding: "15px 18px", paddingRight: 50, borderRadius: 14 }} />
                <button type="button" onClick={() => setShowPassword(s => !s)} aria-label={showPassword ? "Sembunyikan kata sandi" : "Tampilkan kata sandi"}
                  style={{ position: "absolute", right: 14, top: "50%", transform: "translateY(-50%)", color: "#94a3b8" }}>
                  <Icon name={showPassword ? "eye-off" : "eye"} size={20} />
                </button>
              </div>
            </div>

            {error && <div style={{ borderRadius: 12, background: "var(--red-soft)", color: "var(--red)", fontSize: 15, padding: "12px 16px" }}>{error}</div>}

            <button type="submit" disabled={submitting} className="btn btn-lg" style={{ width: "100%", background: "#fff", color: "var(--accent-700)", fontSize: 17, padding: "16px 0", borderRadius: 14 }}>
              {submitting ? "Memeriksa..." : (<React.Fragment><Icon name="log-in" size={19} /> Masuk</React.Fragment>)}
            </button>
          </form>

          <div style={{ marginTop: 32, paddingTop: 28, borderTop: "1px solid rgba(255,255,255,.2)" }}>
            <p style={{ fontSize: 13, color: "rgba(255,255,255,.65)", textAlign: "center" }}>Hubungi administrator jika lupa kata sandi.</p>
          </div>
        </div>
      </div>
    </div>
  );
}

function RadiusNote({ distance, withinRadius, nearestLocation }) {
  if (distance == null) return null;
  const locName = nearestLocation ? ` — ${nearestLocation}` : "";
  return (
    <p className="flex" style={{ alignItems: "center", gap: 6, fontSize: 12, marginTop: 6, color: withinRadius ? "var(--green)" : "var(--red)" }}>
      <Icon name={withinRadius ? "check-circle-2" : "alert-triangle"} size={13} />
      {withinRadius
        ? `Dalam radius kantor${locName} (±${distance} m)`
        : `Di luar radius kantor${locName} (±${distance} m)`}
    </p>
  );
}

/* ======================= HALAMAN RIWAYAT + GRAFIK ======================= */
function HistoryPage({ user }) {
  const [monthFilter, setMonthFilter] = useState("all");
  const records = useMemo(() => getRecordsByUser(user.id).sort((a, b) => (a.date < b.date ? 1 : -1)), [user.id]);
  const months = useMemo(() => Array.from(new Set(records.map(r => r.date.slice(0, 7)))).sort().reverse(), [records]);
  const filtered = useMemo(() => monthFilter === "all" ? records : records.filter(r => r.date.startsWith(monthFilter)), [records, monthFilter]);

  const chartData = useMemo(() => {
    const months6 = [];
    const cursor = new Date();
    cursor.setDate(1);
    for (let i = 5; i >= 0; i--) {
      const d = new Date(cursor.getFullYear(), cursor.getMonth() - i, 1);
      months6.push(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`);
    }
    return months6.map(mk => {
      const eff = getEffectiveRecordsForUserMonth(user.id, user.name, mk);
      return {
        month: mk,
        Hadir: eff.filter(r => r.status === STATUS.HADIR).length,
        Terlambat: eff.filter(r => r.status === STATUS.TERLAMBAT).length,
        Alpha: eff.filter(r => r.status === STATUS.ALPHA).length,
      };
    });
  }, [user.id, user.name, records]);

  const { BarChart, Bar, XAxis, YAxis, Tooltip, Legend, ResponsiveContainer, CartesianGrid } = Recharts;

  return (
    <div className="container-md">
      <div style={{ marginBottom: 24 }}>
        <h1 style={{ fontSize: 20, fontWeight: 700, color: "var(--navy-900)" }}>Riwayat Presensi</h1>
        <p style={{ color: "#64748b", fontSize: 14, marginTop: 2 }}>Lihat rekam jejak kehadiran harian dan bulanan Anda.</p>
      </div>

      <div className="card" style={{ padding: 20, marginBottom: 24 }}>
        <h2 style={{ fontSize: 14, fontWeight: 700, color: "var(--navy-900)", marginBottom: 16 }}>Grafik Kehadiran 6 Bulan Terakhir</h2>
        <ResponsiveContainer width="100%" height={220}>
          <BarChart data={chartData}>
            <CartesianGrid vertical={false} stroke="#E2E6EC" />
            <XAxis dataKey="month" tick={{ fontSize: 11, fill: "#64748b" }} axisLine={false} tickLine={false} />
            <YAxis tick={{ fontSize: 11, fill: "#64748b" }} axisLine={false} tickLine={false} allowDecimals={false} />
            <Tooltip contentStyle={{ borderRadius: 10, border: "1px solid #E2E6EC", fontSize: 12 }} />
            <Legend wrapperStyle={{ fontSize: 12 }} />
            <Bar dataKey="Hadir" fill="#16A34A" radius={[4, 4, 0, 0]} />
            <Bar dataKey="Terlambat" fill="#D97706" radius={[4, 4, 0, 0]} />
            <Bar dataKey="Alpha" fill="#DC2626" radius={[4, 4, 0, 0]} />
          </BarChart>
        </ResponsiveContainer>
      </div>

      <div className="flex scrollbar-none" style={{ gap: 8, overflowX: "auto", paddingBottom: 4, marginBottom: 16 }}>
        <button onClick={() => setMonthFilter("all")} className={`chip ${monthFilter === "all" ? "chip-active" : "chip-inactive"}`}>Semua</button>
        {months.map(m => (
          <button key={m} onClick={() => setMonthFilter(m)} className={`chip ${monthFilter === m ? "chip-active" : "chip-inactive"}`}>
            {new Date(m + "-01").toLocaleDateString("id-ID", { month: "long", year: "numeric" })}
          </button>
        ))}
      </div>

      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {filtered.length === 0 ? (
          <div className="card" style={{ padding: 32, textAlign: "center", fontSize: 14, color: "#64748b" }}>Tidak ada catatan pada periode ini.</div>
        ) : filtered.map(r => (
          <div key={r.id} className="card" style={{ padding: 16 }}>
            <div className="flex" style={{ alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <p style={{ fontSize: 14, fontWeight: 600, color: "var(--navy-900)" }}>{formatDateShortID(r.date)}</p>
              <StatusBadge status={r.status} />
            </div>
            <div className="flex" style={{ alignItems: "center", gap: 20, fontSize: 12, color: "#64748b" }}>
              <span>Masuk {formatTimeHM(r.checkInTime)}</span>
              <span>Pulang {formatTimeHM(r.checkOutTime)}</span>

function LeaveRequestModal({ user, onClose, onSaved }) {
  const todayStr = todayDateStr();
  const [form, setForm] = useState({ startDate: todayStr, endDate: todayStr, reason: "" });
  const [error, setError] = useState("");
  const [saving, setSaving] = useState(false);

  function update(field, value) {
    setForm(f => {
      const next = { ...f, [field]: value };
      if (field === "startDate" && next.endDate < value) next.endDate = value;
      return next;
    });
    setError("");
  }

  function handleSubmit(e) {
    e.preventDefault();
    if (!form.reason.trim()) return setError("Alasan izin/cuti wajib diisi.");
    if (form.endDate < form.startDate) return setError("Tanggal selesai tidak boleh sebelum tanggal mulai.");
    setSaving(true);
    try {
      addLeaveRequest({ userId: user.id, userName: user.name, startDate: form.startDate, endDate: form.endDate, reason: form.reason });
      onSaved();
    } catch {
      setError("Terjadi kesalahan saat mengirim pengajuan.");
    } finally {
      setSaving(false);
    }
  }

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal-box fade-up" style={{ maxWidth: 440 }} onClick={e => e.stopPropagation()}>
        <form onSubmit={handleSubmit}>
          <div className="flex" style={{ alignItems: "center", justifyContent: "space-between", padding: "18px 20px", borderBottom: "1px solid var(--line)" }}>

/* ======================= MODAL REKAP PDF PER KARYAWAN ======================= */
function RekapPDFModal({ users, onClose }) {
  const [selectedUserId, setSelectedUserId] = useState(users[0]?.id || "");
  const [selectedMonth, setSelectedMonth] = useState(currentMonthKey());
  const [previewing, setPreviewing] = useState(false);

  const selectedUser = users.find(u => u.id === selectedUserId);

  // Filter bulan hanya sejak joinDate user yang dipilih
  const monthOptions = useMemo(() => {
    const opts = [];
    const now = new Date();
    let joinYM = null;
    if (selectedUser && selectedUser.joinDate) {
      const jd = new Date(selectedUser.joinDate + "T00:00:00");
      joinYM = `${jd.getFullYear()}-${String(jd.getMonth() + 1).padStart(2, "0")}`;
    }
    for (let i = 0; i < 36; i++) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
      if (joinYM && key < joinYM) break;
      opts.push({ key, label: d.toLocaleDateString("id-ID", { month: "long", year: "numeric" }) });
    }
    return opts;
  }, [selectedUser]);

  // Reset bulan saat ganti user
  React.useEffect(() => {
    const cur = currentMonthKey();
    if (selectedUser && selectedUser.joinDate) {
      const jd = new Date(selectedUser.joinDate + "T00:00:00");
      const joinYM = `${jd.getFullYear()}-${String(jd.getMonth() + 1).padStart(2, "0")}`;
      setSelectedMonth(cur >= joinYM ? cur : joinYM);
    } else {
      setSelectedMonth(cur);
    }
  }, [selectedUserId]);

  // Records dari Firestore/store untuk bulan ini
  const previewRecords = useMemo(() => {
    if (!selectedUser) return [];
    return getEffectiveRecordsForUserMonth(selectedUser.id, selectedUser.name, selectedMonth)
      .sort((a, b) => (a.date > b.date ? 1 : -1));
  }, [selectedUser, selectedMonth]);

  // Semua hari dalam bulan (termasuk hari tanpa record → Alpha)
  const allRows = useMemo(() => {
    if (!selectedMonth) return [];
    const [yr, mo] = selectedMonth.split("-").map(Number);
    const daysInMonth = new Date(yr, mo, 0).getDate();
    const recMap = {};
    previewRecords.forEach(r => { recMap[r.date] = r; });
    const rows = [];
    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${yr}-${String(mo).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
      const rec = recMap[dateStr];
      rows.push({
        date: dateStr,
        checkInTime:  rec ? rec.checkInTime  : null,
        checkOutTime: rec ? rec.checkOutTime : null,
        status: rec ? rec.status : STATUS.ALPHA,
      });
    }
    return rows;
  }, [previewRecords, selectedMonth]);

  const stats = useMemo(() => ({
    hadir:     allRows.filter(r => r.status === STATUS.HADIR).length,
    terlambat: allRows.filter(r => r.status === STATUS.TERLAMBAT).length,
    alpha:     allRows.filter(r => r.status === STATUS.ALPHA).length,
    izin:      allRows.filter(r => r.status === STATUS.IZIN).length,
  }), [allRows]);

  const avgLabel = useMemo(() => {
    const mins = allRows
      .filter(r => r.checkInTime && r.checkOutTime)
      .map(r => {
        const [h1, m1] = r.checkInTime.split(":").map(Number);
        const [h2, m2] = r.checkOutTime.split(":").map(Number);
        let d = h2 * 60 + m2 - (h1 * 60 + m1);
        if (d < 0) d += 24 * 60;
        return d;
      });
    if (!mins.length) return "—";
    const avg = Math.round(mins.reduce((a, b) => a + b, 0) / mins.length);
    return `${Math.floor(avg / 60)}j ${avg % 60}m`;
  }, [allRows]);

  function handleGenerate() {
    if (!selectedUser) return;
    setPreviewing(true);
    setTimeout(() => {
      exportRekapPDF(selectedUser, selectedMonth, previewRecords);
      setPreviewing(false);
    }, 80);
  }

  const STATUS_COLOR = {
    [STATUS.HADIR]:     { bg: "var(--green-soft)",  color: "var(--green)" },
    [STATUS.TERLAMBAT]: { bg: "var(--amber-soft)",  color: "var(--amber)" },
    [STATUS.ALPHA]:     { bg: "var(--red-soft)",    color: "var(--red)" },
    [STATUS.IZIN]:      { bg: "var(--violet-soft)", color: "var(--violet)" },
  };

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal-box fade-up" style={{ maxWidth: 560 }} onClick={e => e.stopPropagation()}>
        <div className="flex" style={{ alignItems: "center", justifyContent: "space-between", padding: "18px 20px", borderBottom: "1px solid var(--line)" }}>
          <div>
            <h3 style={{ fontSize: 16, fontWeight: 700, color: "var(--navy-900)" }}>Rekap Kehadiran PDF</h3>
            <p style={{ fontSize: 12, color: "#94a3b8", marginTop: 2 }}>Slip rekap resmi per karyawan per bulan</p>
          </div>
          <button onClick={onClose} aria-label="Tutup" style={{ color: "#94a3b8", padding: 4 }}><Icon name="x" size={20} /></button>
        </div>

        <div style={{ padding: 20, display: "flex", flexDirection: "column", gap: 16 }}>
          <div className="grid-2" style={{ gap: 12 }}>
            <div>
              <label className="label">Karyawan</label>
              <select className="input" value={selectedUserId} onChange={e => setSelectedUserId(e.target.value)}>
                {users.map(u => <option key={u.id} value={u.id}>{u.name}</option>)}
              </select>
            </div>
            <div>
              <label className="label">Bulan</label>
              <select className="input" value={selectedMonth} onChange={e => setSelectedMonth(e.target.value)}>
                {monthOptions.map(o => <option key={o.key} value={o.key}>{o.label}</option>)}
              </select>
            </div>
          </div>

          {selectedUser && (
            <div className="card" style={{ padding: 16, background: "var(--slate-mist)", border: "none" }}>
              <div className="flex" style={{ alignItems: "center", gap: 10, marginBottom: 14 }}>
                <Avatar name={selectedUser.name} color={selectedUser.avatarColor} size={36} />
                <div>
                  <p style={{ fontWeight: 600, fontSize: 14, color: "var(--navy-900)" }}>{selectedUser.name}</p>
                  <p style={{ fontSize: 12, color: "#94a3b8" }}>{selectedUser.position} · {selectedUser.department}</p>
                </div>
              </div>

              <div className="grid-4" style={{ gap: 8 }}>
                {[
                  { label: "Hadir",     value: stats.hadir,     status: STATUS.HADIR },
                  { label: "Terlambat", value: stats.terlambat, status: STATUS.TERLAMBAT },
                  { label: "Alpha",     value: stats.alpha,     status: STATUS.ALPHA },
                  { label: "Izin",      value: stats.izin,      status: STATUS.IZIN },
                ].map(s => (
                  <div key={s.label} style={{ textAlign: "center", padding: "10px 4px", borderRadius: 10, background: STATUS_COLOR[s.status]?.bg }}>
                    <p style={{ fontSize: 20, fontWeight: 700, color: STATUS_COLOR[s.status]?.color }}>{s.value}</p>
                    <p style={{ fontSize: 11, color: "#64748b", marginTop: 2 }}>{s.label}</p>
                  </div>
                ))}
              </div>

              <div className="flex" style={{ gap: 20, marginTop: 12, paddingTop: 12, borderTop: "1px solid var(--line)", fontSize: 12, color: "#64748b" }}>
                <span><b style={{ color: "var(--navy-900)" }}>{previewRecords.length}</b> hari tercatat</span>
                <span>Rata-rata kerja: <b style={{ color: "var(--navy-900)" }}>{avgLabel}</b></span>
              </div>
            </div>
          )}

          {previewRecords.length === 0 && selectedUser && (
            <p style={{ fontSize: 13, color: "#94a3b8", textAlign: "center" }}>Tidak ada data kehadiran untuk bulan ini.</p>
          )}
        </div>

        <div className="flex" style={{ gap: 10, padding: "16px 20px", borderTop: "1px solid var(--line)" }}>
          <Button variant="outline" onClick={onClose} style={{ flex: 1 }}>Batal</Button>
          <Button variant="primary" onClick={handleGenerate} disabled={previewing || previewRecords.length === 0} style={{ flex: 1 }}>
            {previewing
              ? <React.Fragment><Icon name="loader-2" size={15} className="spin" /> Membuat PDF…</React.Fragment>
              : <React.Fragment><Icon name="file-down" size={15} /> Download Rekap PDF</React.Fragment>
            }
          </Button>
        </div>
      </div>
    </div>
  );
}
