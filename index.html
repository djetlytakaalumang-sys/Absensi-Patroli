function AdminDashboard() {
  const [dateFilter, setDateFilter] = useState("");
  const [nameFilter, setNameFilter] = useState("");
  const [statusFilter, setStatusFilter] = useState("all");
  const [detailRecord, setDetailRecord] = useState(null);
  const [showRekap, setShowRekap] = useState(false);
  useStoreSync();

  const checkOutReminderHour = 17;

  const users = useMemo(() => getUsers().filter(u => u.role === ROLES.EMPLOYEE), []);
  const mk = currentMonthKey();
  const allRecords = useMemo(() => {
    const real = getRecords();
    const realKeys = new Set(real.map(r => `${r.userId}__${r.date}`));
    const synthetic = [];
    users.forEach(u => {
      getEffectiveRecordsForUserMonth(u.id, u.name, mk).forEach(r => {
        if (r.synthetic && !realKeys.has(`${r.userId}__${r.date}`)) synthetic.push(r);
      });
    });
    return [...real, ...synthetic].sort((a, b) => (a.date < b.date ? 1 : -1));
  }, [users, mk]);

  const filtered = useMemo(() => allRecords.filter(r => {
    if (dateFilter && r.date !== dateFilter) return false;
    if (nameFilter && !r.userName.toLowerCase().includes(nameFilter.toLowerCase())) return false;
    if (statusFilter !== "all" && r.status !== statusFilter) return false;
    return true;
  }), [allRecords, dateFilter, nameFilter, statusFilter]);

  const today = todayDateStr();
  const todayRecords = allRecords.filter(r => r.date === today);
  const hadirToday = todayRecords.filter(r => r.status === "Hadir" || r.status === "Terlambat").length;
  const terlambatToday = todayRecords.filter(r => r.status === "Terlambat").length;
  const belumAbsenToday = users.length - todayRecords.length;
  const alphaThisMonth = allRecords.filter(r => r.date.startsWith(mk) && r.status === STATUS.ALPHA).length;

  const lupaAbsenPulangIds = useMemo(() => getLupaAbsenPulang(users, checkOutReminderHour), [users]);
  const lupaAbsenPulangUsers = users.filter(u => lupaAbsenPulangIds.includes(u.id));

  function clearFilters() { setDateFilter(""); setNameFilter(""); setStatusFilter("all"); }

  return (
    <div className="container-app">
      <div className="flex" style={{ flexDirection: "column", gap: 12, marginBottom: 24 }}>
        <div className="flex" style={{ alignItems: "flex-end", justifyContent: "space-between", flexWrap: "wrap", gap: 12 }}>
          <div>
            <h1 style={{ fontSize: 20, fontWeight: 700, color: "var(--navy-900)" }}>Dashboard Admin</h1>
            <p style={{ color: "#64748b", fontSize: 14, marginTop: 2 }}>Pantau kehadiran seluruh karyawan secara real-time.</p>
          </div>
          <div className="flex" style={{ gap: 8, flexWrap: "wrap" }}>
            <Button variant="outline" size="sm" onClick={() => setShowRekap(true)}><Icon name="file-badge" size={15} /> Rekap PDF</Button>
            <Button variant="outline" size="sm" onClick={() => exportToExcel(filtered)}><Icon name="file-spreadsheet" size={15} /> Excel</Button>
            <Button variant="outline" size="sm" onClick={() => exportToPDF(filtered)}><Icon name="file-text" size={15} /> PDF</Button>
          </div>
        </div>
      </div>

      {lupaAbsenPulangUsers.length > 0 && (
        <div className="card" style={{ padding: 14, marginBottom: 20, background: "#fffbeb", border: "1px solid #fde68a", display: "flex", gap: 12, alignItems: "flex-start" }}>
          <Icon name="clock-alert" size={18} style={{ color: "var(--amber)", flexShrink: 0, marginTop: 2 }} />
          <div>
            <p style={{ fontSize: 13, fontWeight: 700, color: "#92400e" }}>
              {lupaAbsenPulangUsers.length} karyawan belum absen pulang
            </p>
            <p style={{ fontSize: 12, color: "#92400e", marginTop: 3 }}>
              {lupaAbsenPulangUsers.map(u => u.name).join(", ")}
            </p>
          </div>
        </div>
      )}

      <div className="grid-5" style={{ marginBottom: 24 }}>
        <StatCard icon="users" label="Total Karyawan" value={users.length} colorVar="var(--accent-700)" softVar="var(--accent-50)" />
        <StatCard icon="calendar-check" label="Hadir Hari Ini" value={hadirToday} colorVar="var(--green)" softVar="var(--green-soft)" />
        <StatCard icon="alert-triangle" label="Terlambat Hari Ini" value={terlambatToday} colorVar="var(--amber)" softVar="var(--amber-soft)" />
        <StatCard icon="user-x" label="Belum Absen" value={belumAbsenToday} colorVar="var(--red)" softVar="var(--red-soft)" />
        <StatCard icon="calendar-x" label="Alpha Bulan Ini" value={alphaThisMonth} colorVar="var(--red)" softVar="var(--red-soft)" />
      </div>

      <div className="card" style={{ padding: 16, marginBottom: 24 }}>
        <div className="flex" style={{ flexWrap: "wrap", alignItems: "center", gap: 12 }}>
          <div style={{ position: "relative", flex: 1, minWidth: 180 }}>
            <span style={{ position: "absolute", left: 12, top: "50%", transform: "translateY(-50%)", color: "#94a3b8" }}><Icon name="search" size={15} /></span>
            <input type="text" value={nameFilter} onChange={e => setNameFilter(e.target.value)} placeholder="Cari nama karyawan…" className="input" style={{ paddingLeft: 36 }} />
          </div>
          <input type="date" value={dateFilter} onChange={e => setDateFilter(e.target.value)} className="input" style={{ width: "auto", color: "#64748b" }} />
          <select value={statusFilter} onChange={e => setStatusFilter(e.target.value)} className="input" style={{ width: "auto", color: "#64748b" }}>
            <option value="all">Semua status</option>
            <option value="Hadir">Hadir</option>
            <option value="Terlambat">Terlambat</option>
            <option value="Izin">Izin</option>
            <option value="Alpha">Alpha</option>
          </select>
          {(dateFilter || nameFilter || statusFilter !== "all") && (
            <button onClick={clearFilters} style={{ fontSize: 12, fontWeight: 600, color: "var(--accent-700)", textDecoration: "underline" }}>Reset filter</button>
          )}
        </div>
      </div>

      <div className="card" style={{ overflow: "hidden" }}>
        <div className="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Karyawan</th><th>Tanggal</th><th>Masuk</th><th>Pulang</th><th>Status</th><th>Lokasi</th><th></th>
              </tr>
            </thead>
            <tbody>
              {filtered.length === 0 && (
                <tr><td colSpan={7} style={{ textAlign: "center", color: "#94a3b8", padding: "40px 0", fontSize: 14 }}>Tidak ada data yang cocok dengan filter.</td></tr>
              )}
              {filtered.map(r => {
                const u = users.find(u => u.id === r.userId);
                return (
                  <tr key={r.id}>
                    <td>
                      <div className="flex" style={{ alignItems: "center", gap: 10 }}>
                        <Avatar name={r.userName} color={u && u.avatarColor} size={30} />
                        <div>
                          <p style={{ fontWeight: 500, color: "var(--navy-900)" }}>{r.userName}</p>
                          <p style={{ fontSize: 12, color: "#94a3b8" }}>{u && u.position}</p>
                        </div>
                      </div>
                    </td>
                    <td style={{ color: "#64748b" }}>{formatDateShortID(r.date)}</td>
                    <td className="tabular" style={{ color: "#64748b" }}>{formatTimeHM(r.checkInTime)}</td>
                    <td className="tabular" style={{ color: "#64748b" }}>{formatTimeHM(r.checkOutTime)}</td>
                    <td><StatusBadge status={r.status} /></td>
                    <td style={{ color: "#64748b", fontSize: 12, maxWidth: 180, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }} title={r.checkInAddress}>
                      {r.status === STATUS.IZIN ? (
                        <span style={{ color: "#94a3b8" }}>—</span>
                      ) : r.synthetic ? (
                        <span style={{ color: "#94a3b8" }}>Tidak ada catatan</span>
                      ) : (
                        <span className="flex" style={{ alignItems: "center", gap: 4 }}>
                          <Icon name="map-pin" size={12} /> {r.checkInAddress || "-"}
                          {r.checkInWithinRadius === false && <Icon name="alert-triangle" size={12} style={{ color: "var(--amber)", flexShrink: 0 }} />}
                        </span>
                      )}
                    </td>
                    <td><button onClick={() => setDetailRecord(r)} style={{ fontSize: 12, fontWeight: 700, color: "var(--accent-700)", textDecoration: "underline" }}>Detail</button></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {detailRecord && <AdminRecordDetail record={detailRecord} onClose={() => setDetailRecord(null)} />}
      {showRekap && <RekapPDFModal users={users} onClose={() => setShowRekap(false)} />}
    </div>
  );
}

/* ======================= MODAL FORM KARYAWAN ======================= */
function EmployeeFormModal({ employee, onClose, onSaved }) {
  const isEdit = !!employee;
  const [form, setForm] = useState({
    name: employee?.name || "",
    username: employee?.username || "",
    password: "",
    position: employee?.position || "",
    department: employee?.department || "",
    phone: employee?.phone || "",
    address: employee?.address || "",
  });
  const [error, setError] = useState("");
  const [saving, setSaving] = useState(false);

  function update(field, value) { setForm(f => ({ ...f, [field]: value })); setError(""); }

  function handleSubmit(e) {
    e.preventDefault();
    setError("");
    if (!form.name.trim()) return setError("Nama karyawan wajib diisi.");
    if (!form.username.trim()) return setError("Username wajib diisi.");
    if (!isEdit && !form.password.trim()) return setError("Kata sandi wajib diisi untuk karyawan baru.");
    if (!form.position.trim()) return setError("Jabatan wajib diisi.");
    if (!form.department.trim()) return setError("Departemen wajib diisi.");
    if (isUsernameTaken(form.username, isEdit ? employee.id : null)) return setError("Username sudah digunakan, pilih username lain.");

    setSaving(true);
    try {
      if (isEdit) {
        const payload = { name: form.name, username: form.username, position: form.position, department: form.department, phone: form.phone, address: form.address };
        if (form.password.trim()) payload.password = form.password;
        updateUser(employee.id, payload);
      } else {
        addUser({ name: form.name, username: form.username, password: form.password, position: form.position, department: form.department, phone: form.phone, address: form.address, role: ROLES.EMPLOYEE });
      }
      onSaved();
    } catch (err) {
      setError("Terjadi kesalahan saat menyimpan data.");
    } finally {
      setSaving(false);
    }
  }

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal-box fade-up" style={{ maxWidth: 440 }} onClick={e => e.stopPropagation()}>
        <form onSubmit={handleSubmit}>
          <div className="flex" style={{ alignItems: "center", justifyContent: "space-between", padding: "18px 20px", borderBottom: "1px solid var(--line)" }}>
            <h3 style={{ fontSize: 16, fontWeight: 700, color: "var(--navy-900)" }}>{isEdit ? "Edit Karyawan" : "Tambah Karyawan"}</h3>
            <button type="button" onClick={onClose} aria-label="Tutup" style={{ color: "#94a3b8", padding: 4 }}><Icon name="x" size={20} /></button>
          </div>
          <div style={{ padding: 20, display: "flex", flexDirection: "column", gap: 14 }}>
            {error && <div style={{ background: "var(--red-soft)", color: "var(--red)", fontSize: 13, padding: "10px 14px", borderRadius: 10 }}>{error}</div>}
            <div>
              <label className="label">Nama lengkap</label>
              <input className="input" type="text" value={form.name} onChange={e => update("name", e.target.value)} placeholder="cth. Dewi Lestari" autoFocus />
            </div>
            <div className="grid-2">
              <div>
                <label className="label">Username</label>
                <input className="input" type="text" value={form.username} onChange={e => update("username", e.target.value)} placeholder="cth. dewi" />
              </div>
              <div>
                <label className="label">{isEdit ? "Kata sandi baru" : "Kata sandi"}</label>
                <input className="input" type="password" value={form.password} onChange={e => update("password", e.target.value)} placeholder={isEdit ? "Kosongkan jika tidak diubah" : "Buat kata sandi"} />
              </div>
            </div>
            <div className="grid-2">
              <div>
                <label className="label">Jabatan</label>
                <input className="input" type="text" value={form.position} onChange={e => update("position", e.target.value)} placeholder="cth. Backend Developer" />
              </div>
              <div>
                <label className="label">Departemen</label>
                <input className="input" type="text" value={form.department} onChange={e => update("department", e.target.value)} placeholder="cth. Engineering" />
              </div>
            </div>
            <div>
              <label className="label">Nomor HP <span style={{ color: "#94a3b8", fontWeight: 400 }}>(opsional)</span></label>
              <input className="input" type="tel" value={form.phone} onChange={e => update("phone", e.target.value)} placeholder="cth. 0812-3456-7890" />
            </div>
            <div>
              <label className="label">Alamat <span style={{ color: "#94a3b8", fontWeight: 400 }}>(opsional)</span></label>
              <textarea className="input" rows={2} value={form.address} onChange={e => update("address", e.target.value)} placeholder="cth. Jl. Merdeka No. 10, Jakarta" style={{ resize: "vertical", fontFamily: "inherit" }} />
            </div>
          </div>
          <div className="flex" style={{ gap: 10, padding: "16px 20px", borderTop: "1px solid var(--line)" }}>
            <Button type="button" variant="outline" onClick={onClose} style={{ flex: 1 }}>Batal</Button>
            <Button type="submit" variant="primary" disabled={saving} style={{ flex: 1 }}>
              {saving ? "Menyimpan…" : isEdit ? "Simpan Perubahan" : "Tambah Karyawan"}
            </Button>
          </div>
        </form>
      </div>
    </div>
  );
}

/* ======================= MODAL KONFIRMASI HAPUS KARYAWAN ======================= */
function DeleteEmployeeModal({ employee, onClose, onConfirmed }) {
  const [deleting, setDeleting] = useState(false);
  function handleDelete() {
    setDeleting(true);
    deleteUser(employee.id);
    onConfirmed();
  }
  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal-box fade-up" style={{ maxWidth: 380 }} onClick={e => e.stopPropagation()}>
        <div style={{ padding: 24 }}>
          <div className="stat-icon" style={{ background: "var(--red-soft)", marginBottom: 14 }}>
            <Icon name="trash-2" size={18} style={{ color: "var(--red)" }} />
          </div>
          <h3 style={{ fontSize: 16, fontWeight: 700, color: "var(--navy-900)", marginBottom: 6 }}>Hapus karyawan?</h3>
          <p style={{ fontSize: 14, color: "#64748b" }}>
            Karyawan <strong style={{ color: "var(--navy-900)" }}>{employee.name}</strong> beserta seluruh riwayat presensinya akan dihapus permanen. Tindakan ini tidak dapat dibatalkan.
          </p>
        </div>
        <div className="flex" style={{ gap: 10, padding: "0 24px 24px" }}>
          <Button variant="outline" onClick={onClose} style={{ flex: 1 }} disabled={deleting}>Batal</Button>
          <Button variant="danger" onClick={handleDelete} style={{ flex: 1 }} disabled={deleting}>
            {deleting ? "Menghapus…" : "Ya, Hapus"}
          </Button>
        </div>
      </div>
    </div>
  );
}

/* ======================= HALAMAN KARYAWAN (ADMIN VIEW) ======================= */
function EmployeesPage() {
  const [refreshKey, setRefreshKey] = useState(0);
  const [formTarget, setFormTarget] = useState(null);
  const [deleteTarget, setDeleteTarget] = useState(null);

  const employees = useMemo(() => getUsers().filter(u => u.role === ROLES.EMPLOYEE), [refreshKey]);
  const mk = currentMonthKey();

  function refresh() { setRefreshKey(k => k + 1); }
  function handleSaved() { setFormTarget(null); refresh(); }
  function handleDeleted() { setDeleteTarget(null); refresh(); }

  const activeEditEmployee = formTarget && formTarget !== "new"
    ? (employees.find(e => e.id === formTarget.id) || formTarget)
    : formTarget;

  return (
    <div className="container-lg">
      <div className="flex" style={{ alignItems: "center", justifyContent: "space-between", marginBottom: 24, gap: 12, flexWrap: "wrap" }}>
        <div>
          <h1 style={{ fontSize: 20, fontWeight: 700, color: "var(--navy-900)" }}>Karyawan</h1>
          <p style={{ color: "#64748b", fontSize: 14, marginTop: 2 }}>Daftar karyawan terdaftar dan ringkasan kehadiran bulan ini.</p>
        </div>
        <Button variant="primary" onClick={() => setFormTarget("new")}>
          <Icon name="user-plus" size={16} /> Tambah Karyawan
        </Button>
      </div>

      {employees.length === 0 && (
        <div className="card" style={{ padding: 40, textAlign: "center" }}>
          <p style={{ color: "#94a3b8", fontSize: 14 }}>Belum ada karyawan terdaftar. Klik "Tambah Karyawan" untuk menambahkan.</p>
        </div>
      )}

      <div className="grid grid-sm-2" style={{ gap: 12, gridTemplateColumns: "1fr" }}>
        {employees.map(emp => {
          const records = getRecordsByUser(emp.id).filter(r => r.date.startsWith(mk));
          const hadir = records.filter(r => r.status === "Hadir").length;
          const terlambat = records.filter(r => r.status === "Terlambat").length;
          return (
            <div key={emp.id} className="card flex" style={{ padding: 16, alignItems: "center", gap: 14 }}>
              <Avatar name={emp.name} color={emp.avatarColor} size={48} />
              <div style={{ flex: 1, minWidth: 0 }}>
                <p style={{ fontWeight: 600, color: "var(--navy-900)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{emp.name}</p>
                <p style={{ fontSize: 12, color: "#94a3b8", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{emp.position} · {emp.department}</p>
                {emp.phone && (
                  <p style={{ fontSize: 12, color: "#94a3b8", marginTop: 2, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                    <Icon name="phone" size={11} style={{ verticalAlign: "-1px", marginRight: 4 }} />{emp.phone}
                  </p>
                )}
                <div className="flex" style={{ gap: 12, marginTop: 6, fontSize: 12 }}>
                  <span style={{ color: "var(--green)", fontWeight: 600 }}>{hadir} hadir</span>
                  <span style={{ color: "var(--amber)", fontWeight: 600 }}>{terlambat} terlambat</span>
                </div>
              </div>
              <div className="flex" style={{ gap: 4, flexShrink: 0 }}>
                <button onClick={() => setFormTarget(emp)} aria-label="Edit karyawan" title="Edit"
                  style={{ width: 34, height: 34, borderRadius: 10, display: "flex", alignItems: "center", justifyContent: "center", color: "var(--accent-700)" }}
                  onMouseEnter={e => e.currentTarget.style.background = "var(--accent-50)"}
                  onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                  <Icon name="pencil" size={16} />
                </button>
                <button onClick={() => setDeleteTarget(emp)} aria-label="Hapus karyawan" title="Hapus"
                  style={{ width: 34, height: 34, borderRadius: 10, display: "flex", alignItems: "center", justifyContent: "center", color: "var(--red)" }}
                  onMouseEnter={e => e.currentTarget.style.background = "var(--red-soft)"}
                  onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                  <Icon name="trash-2" size={16} />
                </button>
              </div>
            </div>
          );
        })}
      </div>

      {formTarget && (
        <EmployeeFormModal
          key={formTarget === "new" ? "new" : activeEditEmployee.id}
          employee={formTarget === "new" ? null : activeEditEmployee}
          onClose={() => setFormTarget(null)}
          onSaved={handleSaved}
        />
      )}
      {deleteTarget && (
        <DeleteEmployeeModal
          employee={deleteTarget}
          onClose={() => setDeleteTarget(null)}
          onConfirmed={handleDeleted}
        />
      )}
    </div>
  );
}

/* ======================= HALAMAN PENGAJUAN IZIN (ADMIN) ======================= */
function LeaveRequestsPage({ onChanged }) {
  const [tab, setTab] = useState("pending");
  const [refreshKey, setRefreshKey] = useState(0);
  const [busyId, setBusyId] = useState(null);
  useStoreSync();

  const allRequests = useMemo(() => getLeaveRequests(), [refreshKey, store.leaves]);
  const filtered = tab === "all" ? allRequests : allRequests.filter(l => l.status === tab);
  const pendingCount = allRequests.filter(l => l.status === LEAVE_STATUS.PENDING).length;

  function decide(id, decision) {
    setBusyId(id);
    try { decideLeaveRequest(id, decision); } finally {
      setBusyId(null);
      setRefreshKey(k => k + 1);
      if (onChanged) onChanged();
    }
  }

  const TABS = [
    { key: "pending", label: "Menunggu" },
    { key: "approved", label: "Disetujui" },
    { key: "rejected", label: "Ditolak" },
    { key: "all", label: "Semua" },
  ];

  return (
    <div className="container-lg">
      <div style={{ marginBottom: 24 }}>
        <h1 style={{ fontSize: 20, fontWeight: 700, color: "var(--navy-900)" }}>Pengajuan Izin/Cuti</h1>
        <p style={{ color: "#64748b", fontSize: 14, marginTop: 2 }}>Tinjau dan tentukan persetujuan pengajuan izin karyawan.</p>
      </div>

      <div className="flex scrollbar-none" style={{ gap: 8, overflowX: "auto", paddingBottom: 4, marginBottom: 20 }}>
        {TABS.map(t => (
          <button key={t.key} onClick={() => setTab(t.key)} className={`chip ${tab === t.key ? "chip-active" : "chip-inactive"}`}>
            {t.label}{t.key === "pending" && pendingCount > 0 ? ` (${pendingCount})` : ""}
          </button>
        ))}
      </div>

      {filtered.length === 0 ? (
        <div className="card" style={{ padding: 40, textAlign: "center" }}>
          <p style={{ color: "#94a3b8", fontSize: 14 }}>Tidak ada pengajuan pada kategori ini.</p>
        </div>
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {filtered.map(lv => (
            <div key={lv.id} className="card" style={{ padding: 16 }}>
              <div className="flex" style={{ alignItems: "flex-start", justifyContent: "space-between", gap: 12, flexWrap: "wrap" }}>
                <div className="flex" style={{ gap: 12, alignItems: "center" }}>
                  <Avatar name={lv.userName} size={36} />
                  <div>
                    <p style={{ fontWeight: 600, color: "var(--navy-900)", fontSize: 14 }}>{lv.userName}</p>
                    <p style={{ fontSize: 12, color: "#94a3b8" }}>
                      {lv.startDate === lv.endDate ? formatDateShortID(lv.startDate) : `${formatDateShortID(lv.startDate)} — ${formatDateShortID(lv.endDate)}`}
                    </p>
                  </div>
                </div>
                <LeaveStatusBadge status={lv.status} />
              </div>
              <p style={{ fontSize: 13, color: "#64748b", marginTop: 10 }}>{lv.reason}</p>
              {lv.status === LEAVE_STATUS.PENDING && (
                <div className="flex" style={{ gap: 8, marginTop: 12 }}>
                  <Button variant="success" size="sm" disabled={busyId === lv.id} onClick={() => decide(lv.id, LEAVE_STATUS.APPROVED)}>
                    <Icon name="check" size={14} /> Setujui
                  </Button>
                  <Button variant="outline" size="sm" disabled={busyId === lv.id} onClick={() => decide(lv.id, LEAVE_STATUS.REJECTED)}>
                    <Icon name="x" size={14} /> Tolak
                  </Button>
                </div>
              )}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ======================= HALAMAN PENGATURAN (ADMIN) ======================= */
const MAX_OFFICE_LOCATIONS = 5;

function SettingsPage() {
  const [settings, setSettingsState] = useState(getSettings());
  const [locatingIdx, setLocatingIdx] = useState(null);
  const [error, setError] = useState("");
  const [toast, setToast] = useState("");

  function showToast(msg) { setToast(msg); setTimeout(() => setToast(""), 2500); }

  function saveWorkHours(e) {
    e.preventDefault();
    const next = updateSettings({ checkInDeadline: settings.checkInDeadline });
    setSettingsState(next);
    showToast("Jam kerja berhasil disimpan.");
  }

  function getLocations() { return settings.officeLocations || []; }

  function upsertLocation(idx, patch) {
    const locs = [...getLocations()];
    locs[idx] = { ...locs[idx], ...patch };
    const next = updateSettings({ officeLocations: locs });
    setSettingsState(next);
  }

  function addLocation() {
    if (getLocations().length >= MAX_OFFICE_LOCATIONS) return;
    const locs = [...getLocations(), { name: `Lokasi ${getLocations().length + 1}`, lat: null, lng: null }];
    const next = updateSettings({ officeLocations: locs });
    setSettingsState(next);
  }

  function removeLocation(idx) {
    const locs = getLocations().filter((_, i) => i !== idx);
    const next = updateSettings({ officeLocations: locs });
    setSettingsState(next);
    showToast("Lokasi dihapus.");
  }

  async function useCurrentLocation(idx) {
    setLocatingIdx(idx); setError("");
    try {
      const pos = await getCurrentPosition();
      const address = await reverseGeocode(pos.lat, pos.lng);
      upsertLocation(idx, { lat: pos.lat, lng: pos.lng, address });
      showToast(`Koordinat lokasi "${getLocations()[idx]?.name || idx + 1}" berhasil diperbarui.`);
    } catch (err) {
      setError(err.message);
    } finally {
      setLocatingIdx(null);
    }
  }

  function saveRadius(e) {
    e.preventDefault();
    const next = updateSettings({ radiusMeters: Number(settings.radiusMeters) || DEFAULT_SETTINGS.radiusMeters });
    setSettingsState(next);
    showToast("Radius berhasil disimpan — berlaku untuk semua lokasi kantor.");
  }

  function toggleEnforce() {
    const next = updateSettings({ enforceRadius: !settings.enforceRadius });
    setSettingsState(next);
    showToast(next.enforceRadius ? "Absen kini wajib dalam radius kantor." : "Absen di luar radius kini hanya diberi peringatan.");
  }

  const locs = getLocations();

  return (
    <div className="container-md">
      <div style={{ marginBottom: 24 }}>
        <h1 style={{ fontSize: 20, fontWeight: 700, color: "var(--navy-900)" }}>Pengaturan</h1>
        <p style={{ color: "#64748b", fontSize: 14, marginTop: 2 }}>Atur jam kerja dan validasi lokasi kantor untuk presensi.</p>
      </div>

      {toast && <div style={{ marginBottom: 16, background: "var(--green-soft)", color: "var(--green)", fontSize: 13, fontWeight: 600, padding: "10px 14px", borderRadius: 10 }}>{toast}</div>}
      {error && <div style={{ marginBottom: 16, background: "var(--red-soft)", color: "var(--red)", fontSize: 13, padding: "10px 14px", borderRadius: 10 }}>{error}</div>}

      <form onSubmit={saveWorkHours} className="card" style={{ padding: 20, marginBottom: 20 }}>
        <h2 style={{ fontSize: 14, fontWeight: 700, color: "var(--navy-900)", marginBottom: 4 }}>Jam Kerja</h2>
        <p style={{ fontSize: 13, color: "#64748b", marginBottom: 16 }}>Karyawan yang absen masuk melewati jam ini otomatis berstatus "Terlambat".</p>
        <div className="flex" style={{ gap: 12, alignItems: "flex-end", flexWrap: "wrap" }}>
          <div style={{ minWidth: 160 }}>
            <label className="label">Batas jam masuk</label>
            <input className="input" type="time" value={settings.checkInDeadline} onChange={e => setSettingsState(s => ({ ...s, checkInDeadline: e.target.value }))} />
          </div>
          <Button type="submit" variant="primary" size="sm">Simpan</Button>
        </div>
      </form>

      <div className="card" style={{ padding: 20, marginBottom: 20 }}>
        <div className="flex" style={{ alignItems: "center", justifyContent: "space-between", marginBottom: 4, gap: 12, flexWrap: "wrap" }}>
          <div>
            <h2 style={{ fontSize: 14, fontWeight: 700, color: "var(--navy-900)" }}>Lokasi Kantor</h2>
            <p style={{ fontSize: 13, color: "#64748b", marginTop: 2 }}>Maksimal {MAX_OFFICE_LOCATIONS} lokasi. Karyawan valid jika berada dalam radius salah satu lokasi. Koordinat bisa diisi manual atau gunakan GPS.</p>
          </div>
          {locs.length < MAX_OFFICE_LOCATIONS && (
            <Button variant="outline" size="sm" onClick={addLocation}><Icon name="plus" size={14} /> Tambah Lokasi</Button>
          )}
        </div>

        {locs.length === 0 && (
          <div style={{ textAlign: "center", padding: "28px 0", color: "#94a3b8" }}>
            <Icon name="map-pin-off" size={28} style={{ margin: "0 auto 8px", display: "block" }} />
            <p style={{ fontSize: 13 }}>Belum ada lokasi kantor. Klik "Tambah Lokasi" untuk mulai.</p>
          </div>
        )}

        <div style={{ display: "flex", flexDirection: "column", gap: 16, marginTop: locs.length ? 16 : 0 }}>
          {locs.map((loc, idx) => (
            <div key={idx} style={{ border: "1px solid var(--line)", borderRadius: 12, padding: 16 }}>
              <div className="flex" style={{ gap: 10, alignItems: "center", marginBottom: 12 }}>
                <div style={{ width: 28, height: 28, borderRadius: 999, background: "var(--accent-50)", color: "var(--accent-700)", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700, fontSize: 13, flexShrink: 0 }}>
                  {idx + 1}
                </div>
                <input
                  className="input"
                  style={{ flex: 1 }}
                  value={loc.name}
                  onChange={e => upsertLocation(idx, { name: e.target.value })}
                  placeholder={`Nama lokasi ${idx + 1}`}
                />
                <button onClick={() => removeLocation(idx)} title="Hapus lokasi ini"
                  style={{ color: "var(--red)", padding: 6, borderRadius: 8, flexShrink: 0 }}>
                  <Icon name="trash-2" size={16} />
                </button>
              </div>

              <MiniMap lat={loc.lat} lng={loc.lng} height={150} />

              {/* Input manual koordinat */}
              <div className="flex" style={{ gap: 8, marginTop: 10, flexWrap: "wrap" }}>
                <div style={{ flex: 1, minWidth: 120 }}>
                  <label className="label" style={{ fontSize: 12 }}>Latitude</label>
                  <input
                    className="input"
                    type="number"
                    step="any"
                    placeholder="Contoh: -8.67234"
                    value={loc.lat != null ? loc.lat : ""}
                    onChange={e => {
                      const val = parseFloat(e.target.value);
                      upsertLocation(idx, { lat: isNaN(val) ? null : val });
                    }}
                  />
                </div>
                <div style={{ flex: 1, minWidth: 120 }}>
                  <label className="label" style={{ fontSize: 12 }}>Longitude</label>
                  <input
                    className="input"
                    type="number"
                    step="any"
                    placeholder="Contoh: 115.21234"
                    value={loc.lng != null ? loc.lng : ""}
                    onChange={e => {
                      const val = parseFloat(e.target.value);
                      upsertLocation(idx, { lng: isNaN(val) ? null : val });
                    }}
                  />
                </div>
              </div>

              <div className="flex" style={{ gap: 8, marginTop: 10, alignItems: "center", flexWrap: "wrap" }}>
                <Button type="button" variant="outline" size="sm"
                  disabled={locatingIdx === idx}
                  onClick={() => useCurrentLocation(idx)}>
                  {locatingIdx === idx
                    ? <React.Fragment><Icon name="loader-2" size={13} className="spin" /> Mengambil…</React.Fragment>
                    : <React.Fragment><Icon name="crosshair" size={13} /> Gunakan GPS Saat Ini</React.Fragment>}
                </Button>
                {loc.lat != null && loc.lng != null && (
                  <a
                    href={`https://www.google.com/maps?q=${loc.lat},${loc.lng}`}
                    target="_blank"
                    rel="noopener noreferrer"
                    style={{ display: "inline-flex", alignItems: "center", gap: 4, fontSize: 12, color: "var(--accent-600)", fontWeight: 500, textDecoration: "none" }}>
                    <Icon name="map" size={13} /> Lihat di Maps
                  </a>
                )}
                {loc.lat != null && loc.lng != null && (
                  <span style={{ fontSize: 11, color: "#94a3b8" }}>
                    {loc.lat.toFixed(5)}, {loc.lng.toFixed(5)}
                  </span>
                )}
              </div>
              {loc.address && (
                <p style={{ fontSize: 11, color: "#94a3b8", marginTop: 6 }}>{loc.address}</p>
              )}

              {/* Tombol simpan koordinat manual */}
              <div style={{ marginTop: 10, paddingTop: 10, borderTop: "1px solid var(--line)" }}>
                <Button type="button" variant="primary" size="sm"
                  disabled={loc.lat == null || loc.lng == null}
                  onClick={async () => {
                    if (loc.lat == null || loc.lng == null) return;
                    showToast("Menyimpan koordinat…");
                    const address = await reverseGeocode(loc.lat, loc.lng).catch(() => null);
                    upsertLocation(idx, { lat: loc.lat, lng: loc.lng, address: address || `${loc.lat.toFixed(5)}, ${loc.lng.toFixed(5)}` });
                    showToast(`Lokasi "${loc.name}" berhasil disimpan ke Firestore.`);
                  }}>
                  <Icon name="save" size={13} /> Simpan Lokasi Ini
                </Button>
              </div>
            </div>
          ))}
        </div>

        {locs.length > 0 && (
          <React.Fragment>
            <form onSubmit={saveRadius} className="flex" style={{ gap: 12, alignItems: "flex-end", flexWrap: "wrap", marginTop: 20, paddingTop: 20, borderTop: "1px solid var(--line)" }}>
              <div style={{ minWidth: 200 }}>
                <label className="label">Radius toleransi (meter) — berlaku untuk semua lokasi</label>
                <input className="input" type="number" min={50} step={50}
                  value={settings.radiusMeters}
                  onChange={e => setSettingsState(s => ({ ...s, radiusMeters: e.target.value }))} />
              </div>
              <Button type="submit" variant="primary" size="sm">Simpan</Button>
            </form>

            <div className="flex" style={{ alignItems: "center", justifyContent: "space-between", gap: 12, paddingTop: 16, marginTop: 16, borderTop: "1px solid var(--line)" }}>
              <div>
                <p style={{ fontSize: 14, fontWeight: 600, color: "var(--navy-900)" }}>Wajibkan absen dalam radius kantor</p>
                <p style={{ fontSize: 12, color: "#64748b", marginTop: 2 }}>
                  Jika aktif, karyawan di luar semua lokasi akan diblokir. Jika nonaktif, absen tetap bisa dilakukan namun ditandai untuk admin.
                </p>
              </div>
              <button type="button" onClick={toggleEnforce} aria-pressed={settings.enforceRadius}
                style={{ flexShrink: 0, width: 46, height: 26, borderRadius: 999, padding: 3, background: settings.enforceRadius ? "var(--accent-600)" : "#e2e6ec", transition: ".15s" }}>
                <span style={{ display: "block", width: 20, height: 20, borderRadius: 999, background: "#fff", transform: settings.enforceRadius ? "translateX(20px)" : "translateX(0)", transition: ".15s" }} />
              </button>
            </div>
          </React.Fragment>
        )}
      </div>
    </div>
  );
}

/* ======================= APP UTAMA ======================= */
const EMPLOYEE_NAV = [
  { key: "home", label: "Presensi", icon: "layout-dashboard" },
  { key: "history", label: "Riwayat", icon: "history" },
  { key: "leave", label: "Izin", icon: "calendar-plus" },
  { key: "profile", label: "Profil", icon: "user-circle" },
];

function App() {
  const { user, loading, logout } = useAuth();
  const [page, setPage] = useState("home");
  const [leaveTick, setLeaveTick] = useState(0);

  const pendingLeaveCount = useMemo(() => {
    if (!user || user.role !== ROLES.ADMIN) return 0;
    return getLeaveRequests().filter(l => l.status === LEAVE_STATUS.PENDING).length;
  }, [user, leaveTick, page]);

  const adminNav = useMemo(() => [
    { key: "home", label: "Dashboard", icon: "clipboard-list" },
    { key: "employees", label: "Karyawan", icon: "users" },
    { key: "leaves", label: "Pengajuan Izin", icon: "calendar-clock", badge: pendingLeaveCount },
    { key: "settings", label: "Pengaturan", icon: "settings" },
  ], [pendingLeaveCount]);

  if (loading) {
    return (
      <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 16, background: "var(--slate-mist)" }}>
        <div className="spinner" />
        <p style={{ fontSize: 13, color: "#94a3b8", fontWeight: 500 }}>Menghubungkan ke server…</p>
      </div>
    );
  }
  if (!user) return <LoginPage />;

  const isAdmin = user.role === ROLES.ADMIN;
  const navItems = isAdmin ? adminNav : EMPLOYEE_NAV;

  function renderPage() {
    if (isAdmin) {
      if (page === "employees") return <EmployeesPage />;
      if (page === "leaves") return <LeaveRequestsPage onChanged={() => setLeaveTick(t => t + 1)} />;
      if (page === "settings") return <SettingsPage />;
      return <AdminDashboard />;
    }
    if (page === "history") return <HistoryPage user={user} />;
    if (page === "leave") return <EmployeeLeavePage user={user} />;
    if (page === "profile") return <ProfilePage user={user} />;
    return <EmployeeDashboard user={user} />;
  }

  return (
    <div className="lg-flex" style={{ minHeight: "100vh", background: "var(--slate-mist)" }}>
      <Sidebar user={user} navItems={navItems} activeKey={page} onNavigate={setPage} onLogout={logout} />
      <main style={{ flex: 1, paddingBottom: 80 }}>{renderPage()}</main>
    </div>
  );
}

/* ======================= RENDER ROOT ======================= */
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<AuthProvider><App /></AuthProvider>);

</script>
</body>
